<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA COFFEE | Professional View</title>
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0;
            padding: env(safe-area-inset-top) 15px 20px;
        }

        /* شاشة التحضير */
        #prep-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.98);
            z-index: 3000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .timer-circle {
            width: 180px; height: 180px;
            border: 4px solid #d4af37;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            font-size: 2.5rem; color: #d4af37;
            margin-bottom: 20px;
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.2);
        }

        /* بار الطلب العلوي - إصلاح التداخل */
        .top-checkout {
            position: sticky; top: 10px; z-index: 1000;
            background: #d4af37; color: black;
            padding: 12px 20px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            max-width: 450px; margin: 0 auto 25px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.4);
        }

        .complete-btn {
            background: black; color: white; border: none;
            padding: 8px 18px; border-radius: 10px; font-weight: bold;
            cursor: pointer; font-size: 0.9rem;
        }

        .logo-text { 
            text-align: center; color: #d4af37; 
            font-size: 2.5rem; font-weight: 900; 
            margin: 20px 0; letter-spacing: 4px;
        }

        .section-title { 
            color: #d4af37; font-size: 1.2rem; 
            margin: 25px 0 15px; font-weight: bold;
            border-right: 4px solid #d4af37; padding-right: 10px;
        }

        /* حاوية المنيو - ترتيب العناصر */
        .menu-container { 
            background: rgba(255, 255, 255, 0.05); 
            border-radius: 20px; padding: 5px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .item { 
            display: flex; align-items: center; 
            padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .item:last-child { border-bottom: none; }

        .product-img { 
            width: 75px; height: 75px; border-radius: 15px; 
            object-fit: cover; margin-left: 15px;
            border: 1px solid rgba(212, 175, 55, 0.3);
        }

        .product-info { flex-grow: 1; text-align: right; }
        .product-info strong { display: block; font-size: 1.1rem; margin-bottom: 2px; }
        .product-info span { font-size: 0.85rem; color: #aaa; display: block; }

        .action-area { text-align: left; min-width: 80px; }
        .price-tag { color: #d4af37; font-weight: bold; display: block; margin-bottom: 8px; font-size: 0.95rem; }
        
        .buy-btn { 
            background: #d4af37; color: black; border: none;
            padding: 6px 20px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; font-size: 0.85rem;
        }
    </style>
</head>
<body>

    <div id="prep-screen">
        <div class="timer-circle" id="timerDisplay">05:00</div>
        <h2 style="color: #d4af37;">جاري التحضير...</h2>
        <p>قهوتك ستكون جاهزة خلال 5 دقائق</p>
        <button class="complete-btn" style="margin-top:20px;" onclick="location.reload()">طلب جديد</button>
    </div>

    <div class="top-checkout">
        <span style="font-size: 1.1rem;">المجموع: <strong id="cartTotal">0</strong> SR</span>
        <button class="complete-btn" onclick="startPreparation()">اكتمال الطلب</button>
    </div>

    <div class="logo-text">RA COFFEE</div>

    <div class="section-title">المشروبات الباردة</div>
    <div class="menu-container">
        <div class="item">
            <img src="https://images.unsplash.com/photo-1499961024600-ad094db305cc?w=200" class="product-img">
            <div class="product-info">
                <strong>V60 بارد</strong>
                <span>V60 Iced Coffee</span>
            </div>
            <div class="action-area">
                <span class="price-tag">26 SR</span>
                <button class="buy-btn" onclick="addToCart(26)">شراء</button>
            </div>
        </div>
        
        <div class="item">
            <img src="https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=200" class="product-img">
            <div class="product-info">
                <strong>آيس لاتيه</strong>
                <span>Iced Latte</span>
            </div>
            <div class="action-area">
                <span class="price-tag">21 SR</span>
                <button class="buy-btn" onclick="addToCart(21)">شراء</button>
            </div>
        </div>
    </div>

    <div class="section-title">الحلى</div>
    <div class="menu-container">
        <div class="item">
            <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=200" class="product-img">
            <div class="product-info">
                <strong>تيراميسو</strong>
                <span>Tiramisu</span>
            </div>
            <div class="action-area">
                <span class="price-tag">32 SR</span>
                <button class="buy-btn" onclick="addToCart(32)">شراء</button>
            </div>
        </div>
    </div>

    <script>
        let total = 0;
        function addToCart(price) {
            total += price;
            document.getElementById('cartTotal').innerText = total;
        }

        function startPreparation() {
            if(total === 0) return alert("السلة فارغة!");
            document.getElementById('prep-screen').style.display = 'flex';
            let time = 300;
            const display = document.getElementById('timerDisplay');
            const countdown = setInterval(() => {
                let mins = Math.floor(time/60);
                let secs = time%60;
                display.innerHTML = `${mins}:${secs<10?'0':''}${secs}`;
                if (time-- <= 0) { clearInterval(countdown); display.innerHTML = "جاهز!"; }
            }, 1000);
        }
    </script>
</body>
</html>
