<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اطمئن - أذكار وأدعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #07080a; color: #f5f6fa; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-window { width: 100%; max-width: 400px; padding: 20px; text-align: center; }
        .azkar-text { font-size: 1.3rem; line-height: 2; margin-bottom: 30px; min-height: 220px; color: #fff; }
        .counter-ring { width: 120px; height: 120px; border: 3px dashed #d4af37; border-radius: 50%; display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; font-size: 2rem; color: #d4af37; cursor: pointer; }
        .btn { background: #d4af37; color: #000; border: none; padding: 10px 25px; border-radius: 20px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="app-window">
        <h1 style="color: #d4af37; font-size: 1.4rem;">الأذكار والأدعية</h1>
        <div id="azkarText" class="azkar-text">جاري التحميل...</div>
        <div class="counter-ring" id="counterVal" onclick="countClick()">0</div>
        <button class="btn" onclick="nextItem()">الذكر/الدعاء التالي ❯</button>
    </div>

    <script>
        const allItems = [
            // الأذكار
            { text: "آية الكرسي: اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ...", count: 1 },
            { text: "بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم.", count: 3 },
            { text: "رضيت بالله رباً، وبالإسلام ديناً، وبمحمد صلى الله عليه وسلم نبياً.", count: 3 },
            // الأدعية
            { text: "الدعاء: اللهم إني أسألك علماً نافعاً، ورزقاً طيباً، وعملاً متقبلاً.", count: 1 },
            { text: "الدعاء: اللهم اغفر لي ولوالدي وللمؤمنين والمؤمنات يوم يقوم الحساب.", count: 1 },
            { text: "الدعاء: ربنا آتنا في الدنيا حسنة، وفي الآخرة حسنة، وقنا عذاب النار.", count: 1 },
            { text: "الدعاء: اللهم أعني على ذكرك وشكرك وحسن عبادتك.", count: 1 },
            { text: "الدعاء: اللهم إني أعوذ بك من الهم والحزن، وأعوذ بك من العجز والكسل.", count: 1 }
        ];

        let index = 0;
        let currentCount = allItems[0].count;

        function updateDisplay() {
            if (index < allItems.length) {
                document.getElementById('azkarText').innerText = allItems[index].text;
                document.getElementById('counterVal').innerText = currentCount;
            } else {
                document.getElementById('azkarText').innerText = "تمت الأذكار والأدعية، بارك الله في يومك.";
                document.getElementById('counterVal').innerText = "✓";
            }
        }

        function countClick() {
            if (currentCount > 0) {
                currentCount--;
                document.getElementById('counterVal').innerText = currentCount;
                if (currentCount === 0) nextItem();
            }
        }

        function nextItem() {
            index++;
            if (index < allItems.length) {
                currentCount = allItems[index].count;
                updateDisplay();
            } else {
                updateDisplay();
            }
        }

        updateDisplay();
    </script>
</body>
</html>
