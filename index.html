<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الأذكار الفاخر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #0f1013;       /* أسود ملكي عميق للغرقة الخلفية */
            --card-bg: #191c21;       /* رمادي داكن فاخر للكروت */
            --gold-primary: #d4af37;  /* ذهبي فاخر */
            --gold-glow: rgba(212, 175, 55, 0.3);
            --text-white: #f5f6fa;    /* أبيض ناصع ومريح للعين */
            --text-muted: #8a8f99;    /* رمادي للنصوص الثانوية */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* إلغاء الوميض الأزرق عند الضغط في الجوال */
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* حاوية التطبيق لمحاكاة شكل الجوال أو الكرت المركزي */
        .app-container {
            width: 100%;
            max-width: 450px;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 30px 20px;
            position: relative;
        }

        @media (min-width: 480px) {
            .app-container {
                height: 850px;
                border-radius: 40px;
                border: 1px solid rgba(212, 175, 55, 0.15);
                box-shadow: 0 25px 50px rgba(0,0,0,0.6);
            }
        }

        /* ترويسة التطبيق */
        .app-header {
            text-align: center;
            width: 100%;
        }

        .category-title {
            color: var(--gold-primary);
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 1px;
            margin: 0;
            text-transform: uppercase;
        }

        .progress-text {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }

        /* منطقة عرض نص الذكر */
        .main-content {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 20px 10px;
        }

        .azkar-card {
            width: 100%;
            text-align: center;
            transition: all 0.3s ease;
        }

        .azkar-text {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            line-height: 2.6rem;
            color: var(--text-white);
            margin: 0 auto;
            max-height: 280px;
            overflow-y: auto;
            padding: 0 10px;
        }

        /* تخصيص السكرول بار لنص الذكر */
        .azkar-text::-webkit-scrollbar {
            width: 4px;
        }
        .azkar-text::-webkit-scrollbar-thumb {
            background: var(--gold-primary);
            border-radius: 2px;
        }

        /* العداد الدائري الفخم */
        .counter-section {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 40px;
        }

        .counter-outer-ring {
            width: 160px;
            height: 160px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 2px dashed var(--gold-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 20px var(--gold-glow);
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.3s ease;
        }

        .counter-outer-ring:active {
            transform: scale(0.95);
            box-shadow: 0 0 35px var(--gold-primary);
        }

        .counter-inner-circle {
            width: 135px;
            height: 135px;
            border-radius: 50%;
            background: radial-gradient(circle, #252a32 0%, #13161a 100%);
            border: 1px solid rgba(212, 175, 55, 0.4);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .counter-number {
            font-size: 3.2rem;
            font-weight: 700;
            color: var(--gold-primary);
            font-family: 'Tajawal', sans-serif;
        }

        /* أزرار التحكم السفلية */
        .footer-controls {
            display: flex;
            justify-content: space-between;
            width: 100%;
            max-width: 280px;
        }

        .control-btn {
            background: none;
            border: 1px solid rgba(212, 175, 55, 0.3);
            color: var(--text-white);
            padding: 10px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s ease;
        }

        .control-btn:hover {
            border-color: var(--gold-primary);
            color: var(--gold-primary);
        }

        /* حركات الأنيميشن عند التغيير */
        .fade-out {
            opacity: 0;
            transform: translateY(-10px);
        }
    </style>
</head>
<body>

    <div class="app-container">
        
        <div class="app-header">
            <h2 class="category-title" id="categoryTitle">أذكار الصباح</h2>
            <div class="progress-text" id="progressText">باقي: 0 / 0</div>
        </div>

        <div class="main-content">
            <div class="azkar-card" id="azkarCard">
                <p class="azkar-text" id="azkarText">جاري تحميل الذكر الفاخر...</p>
            </div>
        </div>

        <div class="counter-section">
            <div class="counter-outer-ring" onclick="handleCounterClick()">
                <div class="counter-inner-circle">
                    <span class="counter-number" id="counterNumber">0</span>
                </div>
            </div>
        </div>

        <div class="footer-controls">
            <button class="control-btn" onclick="nextAzkar()">تخطي ❯</button>
            <button class="control-btn" onclick="resetApp()">إعادة البدء ↺</button>
        </div>

    </div>

    <script>
        // مصفوفة الأذكار الكاملة والمنظمة جاهزة للعرض داخل العداد
        const azkarData = [
            { category: "أذكار الصباح", text: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ...} (آية الكرسي)", count: 1 },
            { category: "أذكار الصباح", text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ هُوَ اللَّهُ أَحَدٌ...} كاملة", count: 3 },
            { category: "أذكار الصباح", text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ...} كاملة", count: 3 },
            { category: "أذكار الصباح", text: "بِسْمِ اللهِ الرَّحْمَنِ الرَّحِيمِ: {قُلْ أَعُوذُ بِرَبِّ النَّاسِ...} كاملة", count: 3 },
            { category: "أذكار الصباح", text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ.", count: 1 },
            { category: "أذكار الصباح", text: "اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ.", count: 1 },
            { category: "أذكار الصباح", text: "بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ.", count: 3 },
            { category: "أذكار الصباح", text: "رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيًّا.", count: 3 },
            { category: "أذكار الصباح", text: "سُبْحَانَ اللَّهِ وَبِحَمْدِهِ.", count: 100 },
            
            { category: "أذكار المساء", text: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللهُ وَحْدَهُ لَا شَرِيكَ لَهُ.", count: 1 },
            { category: "أذكار المساء", text: "اللَّهُمَّ بِكَ أَمْسَيْنَا، وَبِكَ أَصْبَحْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ الْمَصِيرُ.", count: 1 },
            { category: "أذكار المساء", text: "أَعُوذُ بِكَلِمَاتِ اللهِ التَّامَّاتِ مِنْ شَرِّ مَا خَلَقَ.", count: 3 },
            
            { category: "أدعية مأثورة", text: "رَبَّنَا آتِنَا فِي الدُّنْيَا حَسَنَةً وَفِي الْآخِرَةِ حَسَنَةً وَقِنَا عَذَابَ النَّارِ.", count: 1 },
            { category: "أدعية مأثورة", text: "يَا مُقَلِّبَ الْقُلُوبِ ثَبِّتْ قَلْبِي عَلَى دِينِكَ.", count: 1 }
        ];

        let currentIndex = 0;
        let remainingCount = 0;

        function updateUI() {
            if (currentIndex >= azkarData.length) {
                // شاشة النهاية عند اكتمال الأذكار
                document.getElementById('categoryTitle').innerText = "تم بحمد الله";
                document.getElementById('progressText').innerText = "أذكار مكتملة";
                document.getElementById('azkarText').innerText = "قَضَيْتَ ذِكْرَكَ، طَابَ يَوْمُكَ وَحُفِظْتَ بِحِفْظِ اللهِ.";
                document.getElementById('counterNumber').innerText = "✓";
                return;
            }

            const currentItem = azkarData[currentIndex];
            
            // تحديث العناوين والنصوص
            document.getElementById('categoryTitle').innerText = currentItem.category;
            document.getElementById('progressText').innerText = `باقي أذكار: ${azkarData.length - currentIndex} ذكر`;
            document.getElementById('azkarText').innerText = currentItem.text;
            document.getElementById('counterNumber').innerText = remainingCount;
        }

        function handleCounterClick() {
            if (currentIndex >= azkarData.length) return;

            // اهتزاز الجوال عند اللمس لإعطاء شعور السبحة الحقيقية
            if (navigator.vibrate) navigator.vibrate(40);

            remainingCount--;

            if (remainingCount <= 0) {
                // تأثير تلاشي واختفاء ناعم قبل الانتقال للذكر القادم
                const card = document.getElementById('azkarCard');
                card.classList.add('fade-out');

                setTimeout(() => {
                    currentIndex++;
                    if (currentIndex < azkarData.length) {
                        remainingCount = azkarData[currentIndex].count;
                    }
                    updateUI();
                    card.classList.remove('fade-out');
                }, 250);
            } else {
                document.getElementById('counterNumber').innerText = remainingCount;
            }
        }

        function nextAzkar() {
            if (currentIndex < azkarData.length) {
                currentIndex++;
                if (currentIndex < azkarData.length) {
                    remainingCount = azkarData[currentIndex].count;
                }
                updateUI();
            }
        }

        function resetApp() {
            currentIndex = 0;
            remainingCount = azkarData[0].count;
            updateUI();
        }

        // إطلاق التطبيق وضبط العداد الأول عند فتح الصفحة
        window.onload = () => {
            remainingCount = azkarData[0].count;
            updateUI();
        };
    </script>
</body>
</html>
