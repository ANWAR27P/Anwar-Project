<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASC | Specialty Coffee</title>
    <style>
        :root { --gold: #d4af37; --bg: #000; --card: rgba(25, 25, 25, 0.9); }
        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; 
        }

        /* ASC Logo - No Date */
        .brand-header { text-align: center; padding: 50px 0 30px; }
        .logo-circle {
            width: 85px; height: 85px; border: 2px solid var(--gold);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            margin: 0 auto 15px; font-weight: 900; font-size: 1.6rem; color: var(--gold);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.15);
        }
        .brand-name { color: var(--gold); letter-spacing: 4px; font-weight: bold; font-size: 1.1rem; }

        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        .top-bar {
            position: sticky; top: 0; z-index: 1000; background: var(--gold);
            color: #000; padding: 15px 20px; display: flex; justify-content: space-between;
            align-items: center; font-weight: 900; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        .section-title { color: var(--gold); margin: 35px 20px 12px; font-weight: bold; border-right: 4px solid var(--gold); padding-right: 12px; font-size: 1.2rem; }

        .menu-list { padding: 0 15px; }
        .item-card { 
            background: var(--card); border-radius: 22px; display: flex; align-items: center;
            padding: 15px; margin-bottom: 15px; border: 1px solid rgba(255,255,255,0.03);
            backdrop-filter: blur(12px);
        }
        .item-card img { width: 80px; height: 80px; border-radius: 16px; object-fit: cover; }
        .item-info { flex: 1; margin-right: 15px; text-align: right; }
        .item-info b { display: block; font-size: 1.15rem; margin-bottom: 3px; }
        .item-info small { color: #888; font-size: 0.85rem; }
        
        .item-price { text-align: left; min-width: 80px; }
        .price-val { color: var(--gold); font-weight: bold; display: block; margin-bottom: 8px; font-size: 1.1rem; }
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 7px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .buy-btn:active { transform: scale(0.95); }

        #prep-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; flex-direction: column;
            justify-content: center; align-items: center; text-align: center;
        }
        .quote { font-style: italic; color: #aaa; margin-top: 25px; padding: 0 40px; line-height: 1.6; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <div class="logo-circle">ASC</div>
        <div class="brand-name">SPECIALTY COFFEE</div>
        <button class="buy-btn" style="margin-top:40px; padding: 14px 50px;" onclick="startApp()">START</button>
    </div>

    <div id="main-content" style="display:none;">
        <div class="top-bar">
            <span>Total: <span id="total-val">0</span> SR</span>
            <button onclick="goPrep()" style="background:#000; color:var(--gold); border:none; padding:10px 20px; border-radius:12px; font-weight:bold;">Order Now</button>
        </div>

        <div class="brand-header">
            <div class="logo-circle">ASC</div>
            <div class="brand-name">SPECIALTY COFFEE</div>
        </div>

        <div class="section-title">Iced Coffee</div>
        <div class="menu-list">
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=200">
                <div class="item-info"><b>Iced V60</b><small>Single Origin Beans</small></div>
                <div class="item-price"><span class="price-val">18 SR</span><button class="buy-btn" onclick="add(18)">Buy</button></div>
            </div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1551046710-18b230e3f330?w=200">
                <div class="item-info"><b>Spanish Latte</b><small>Sweetened Bliss</small></div>
                <div class="item-price"><span class="price-val">16 SR</span><button class="buy-btn" onclick="add(16)">Buy</button></div>
            </div>
        </div>

        <div class="section-title">Hot Coffee</div>
        <div class="menu-list">
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=200">
                <div class="item-info"><b>Flat White</b><small>Velvety Foam</small></div>
                <div class="item-price"><span class="price-val">13 SR</span><button class="buy-btn" onclick="add(13)">Buy</button></div>
            </div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=200">
                <div class="item-info"><b>Cortado</b><small>Perfect Balance</small></div>
                <div class="item-price"><span class="price-val">14 SR</span><button class="buy-btn" onclick="add(14)">Buy</button></div>
            </div>
        </div>

        <div class="section-title">Desserts</div>
        <div class="menu-list">
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=200">
                <div class="item-info"><b>Tiramisu</b><small>Classic Italian Dessert</small></div>
                <div class="item-price"><span class="price-val">20 SR</span><button class="buy-btn" onclick="add(20)">Buy</button></div>
            </div>
        </div>
    </div>

    <div id="prep-screen">
        <h1 id="timer" style="font-size: 5rem; color: var(--gold); margin: 0; font-weight: 900;">05:00</h1>
        <p id="quote-text" class="quote">"Life begins after coffee."</p>
        <button class="buy-btn" style="margin-top:50px; background:transparent; color:#444; border:1px solid #333;" onclick="location.reload()">Cancel Order</button>
    </div>

    <script>
        let total = 0;
        const quotes = [
            "Life begins after coffee.",
            "Coffee is a hug in a mug.",
            "Stressed, blessed, and coffee obsessed.",
            "Great ideas start with great coffee.",
            "Freshly roasted, freshly brewed, just for you."
        ];

        function startApp() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
        }

        function add(p) { total += p; document.getElementById('total-val').innerText = total; }

        function goPrep() {
            if(total === 0) return;
            document.getElementById('prep-screen').style.display = 'flex';
            let t = 300;
            const prepTimer = setInterval(() => {
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('timer').innerHTML = m + ":" + (s<10?'0':'')+s;
                if(t % 60 === 0 && t !== 300) {
                    document.getElementById('quote-text').innerText = quotes[Math.floor(Math.random()*quotes.length)];
                }
                if(t-- <= 0) {
                    clearInterval(prepTimer);
                    document.getElementById('timer').innerHTML = "Ready!";
                    document.getElementById('quote-text').innerText = "Enjoy your coffee!";
                }
            }, 1000);
        }
    </script>
</body>
</html>
