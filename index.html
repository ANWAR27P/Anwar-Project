<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA COFFEE | Anwar Edition</title>
    <style>
        :root { --gold: #d4af37; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1507133750040-4a8f57021571?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed;
            color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; 
        }

        /* شاشة الدخول */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
        }

        /* الحاوية الرئيسية للمنيو - تأكدنا أنها تظهر بالكامل */
        #main-app { display: none; padding: 20px 15px; }

        .top-bar {
            position: sticky; top: 10px; background: var(--gold);
            color: #000; padding: 15px; border-radius: 15px;
            display: flex; justify-content: space-between; align-items: center;
            max-width: 450px; margin: 0 auto 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .logo-title { text-align: center; color: var(--gold); font-size: 2.5rem; font-weight: 900; letter-spacing: 5px; margin: 20px 0; }
        
        .section-header { 
            color: var(--gold); border-right: 4px solid var(--gold); 
            padding-right: 10px; margin: 25px auto 15px; max-width: 450px; font-weight: bold;
        }

        .menu-box { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(10px);
            border-radius: 20px; border: 1px solid rgba(255,255,255,0.1);
            max-width: 450px; margin: 0 auto 15px; overflow: hidden;
        }

        .menu-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-item:last-child { border-bottom: none; }
        
        .img-container { width: 70px; height: 70px; margin-left: 15px; }
        .img-container img { width: 100%; height: 100%; border-radius: 12px; object-fit: cover; }

        .info { flex-grow: 1; text-align: right; }
        .info b { display: block; font-size: 1.1rem; }
        .info small { color: #888; }

        .price-box { text-align: left; }
        .price-val { color: var(--gold); font-weight: bold; display: block; margin-bottom: 5px; direction: ltr; }
        
        .btn-buy { background: var(--gold); border: none; padding: 6px 20px; border-radius: 20px; font-weight: bold; cursor: pointer; }

        #prep-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 10000; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <!-- شاشة الترحيب -->
    <div id="splash-screen">
        <h1 style="color:var(--gold); font-size: 3rem; letter-spacing: 5px;">RA COFFEE</h1>
        <button class="btn-buy" style="padding: 15px 40px;" onclick="showApp()">دخول للمنيو</button>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="main-app">
        <div class="top-bar">
            <span>المجموع: <b id="totalPrice">0</b> SR</span>
            <button onclick="pay()" style="background:#000; color:var(--gold); border:none; padding:8px 15px; border-radius:8px; font-weight:bold;">اتمام الطلب</button>
        </div>

        <div class="logo-title">RA COFFEE</div>

        <!-- البارد -->
        <div class="section-header">المشروبات الباردة</div>
        <div class="menu-box">
            <div class="menu-item">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1499961024600-ad094db305cc?w=200"></div>
                <div class="info"><b>V60 بارد</b><small>Specialty V60</small></div>
                <div class="price-box"><span class="price-val">26 SR</span><button class="btn-buy" onclick="add(26)">شراء</button></div>
            </div>
            <div class="menu-item">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1551046710-18b230e3f330?w=200"></div>
                <div class="info"><b>سبانيش لاتيه</b><small>Iced Spanish</small></div>
                <div class="price-box"><span class="price-val">24 SR</span><button class="btn-buy" onclick="add(24)">شراء</button></div>
            </div>
        </div>

        <!-- الحار -->
        <div class="section-header">القهوة الحارة</div>
        <div class="menu-box">
            <div class="menu-item">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=200"></div>
                <div class="info"><b>فلات وايت</b><small>Flat White</small></div>
                <div class="price-box"><span class="price-val">18 SR</span><button class="btn-buy" onclick="add(18)">شراء</button></div>
            </div>
        </div>

        <!-- الحلى -->
        <div class="section-header">الحلى</div>
        <div class="menu-box">
            <div class="menu-item">
                <div class="img-container"><img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=200"></div>
                <div class="info"><b>تيراميسو</b><small>Tiramisu</small></div>
                <div class="price-box"><span class="price-val">32 SR</span><button class="btn-buy" onclick="add(32)">شراء</button></div>
            </div>
        </div>
    </div>

    <div id="prep-screen">
        <div id="timer" style="font-size: 4rem; color: var(--gold);">05:00</div>
        <h2 style="color: var(--gold);">جاري التحضير...</h2>
        <button class="btn-buy" onclick="location.reload()">طلب جديد</button>
    </div>

    <script>
        let count = 0;
        function showApp() {
            document.getElementById('splash-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'block';
        }
        function add(p) {
            count += p;
            document.getElementById('totalPrice').innerText = count;
        }
        function pay() {
            if(count === 0) return alert("السلة فارغة");
            document.getElementById('prep-screen').style.display = 'flex';
            let t = 300;
            setInterval(() => {
                let m = Math.floor(t/60); let s = t%60;
                document.getElementById('timer').innerHTML = m + ":" + (s<10?'0':'') + s;
                if(t>0) t--;
            }, 1000);
        }
    </script>
</body>
</html>
