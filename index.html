<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق أنور الإسلامي الفاخر</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07080a;        /* أسود ملكي غامق جداً */
            --panel-bg: #11141a;      /* رمادي داكن فخم للواجهات */
            --gold-premium: #d4af37;  /* ذهبي ملكي متوهج */
            --gold-glow: rgba(212, 175, 55, 0.25);
            --text-main: #f5f6fa;     /* أبيض عاجي */
            --text-muted: #7f8c8d;    /* رمادي للنصوص الفرعية */
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* حاوية التطبيق الرئيسية */
        .app-window {
            width: 100%;
            max-width: 460px;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        @media (min-width: 480px) {
            .app-window {
                height: 880px;
                border-radius: 32px;
                border: 1px solid rgba(212, 175, 55, 0.2);
            }
        }

        /* الشاشات الرئيسية */
        .screen {
            flex-grow: 1;
            display: none;
            flex-direction: column;
            padding: 30px 20px 90px 20px;
            overflow-y: auto;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        /* عناوين الفخامة */
        .screen-title {
            font-family: 'Amiri', serif;
            color: var(--gold-premium);
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            text-shadow: 0 0 10px var(--gold-glow);
            text-align: center;
        }

        .screen-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-align: center;
        }

        /* --- 1. شاشة الأذكار والأدعية --- */
        .azkar-display {
            width: 100%;
            text-align: center;
            margin-top: 20px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .azkar-text {
            font-family: 'Amiri', serif;
            font-size: 1.8rem;
            line-height: 2.8rem;
            color: var(--text-main);
            width: 100%;
            margin: 0;
        }

        .counter-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .counter-ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px dashed var(--gold-premium);
            background: radial-gradient(circle, #1a1e24 0%, #0f1115 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px var(--gold-glow);
            cursor: pointer;
            margin-bottom: 15px;
            transition: transform 0.1s;
        }

        .counter-ring:active { transform: scale(0.95); }

        .counter-val {
            font-size: 3.2rem;
            color: var(--gold-premium);
            font-weight: bold;
        }

        /* --- 2. شاشة المصحف الشريف --- */
        .quran-list {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .surah-card {
            background-color: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .surah-card:hover { border-color: var(--gold-premium); }
        .surah-name { font-family: 'Amiri', serif; font-size: 1.4rem; color: var(--text-main); }
        .surah-meta { font-size: 0.8rem; color: var(--text-muted); }

        /* شاشة عرض آيات السورة (Popup أو لوحة ممتدة) */
        .surah-view {
            display: none;
            width: 100%;
            flex-direction: column;
        }
        .back-btn {
            align-self: flex-start;
            background: none;
            border: 1px solid var(--gold-premium);
            color: var(--gold-premium);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
            margin-bottom: 20px;
        }
        .quran-text-display {
            font-family: 'Amiri', serif;
            font-size: 1.9rem;
            line-height: 3.4rem;
            text-align: justify;
            color: var(--text-main);
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            max-height: 600px;
            overflow-y: auto;
        }

        /* --- 3. شاشة القبلة الملكية --- */
        .compass-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin-top: 50px;
        }

        .compass-rose {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--gold-premium);
            background: radial-gradient(circle, #13161b 60%, #0a0b0d 100%);
            position: absolute;
            transition: transform 0.2s ease-out;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .compass-pointer {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 40px;
            background-color: #e74c3c;
            border-radius: 2px;
            z-index: 5;
        }

        .kaaba-icon {
            position: absolute;
            top: 40px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.5rem;
            color: var(--gold-premium);
        }

        /* --- شريط التنقل السفلي الفخم (Bottom Nav) --- */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background-color: var(--panel-bg);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 10;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--gold-premium);
            font-weight: bold;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .nav-icon { font-size: 1.3rem; }

        .skip-btn {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="app-window">
        
        <div id="azkarScreen" class="screen active">
            <h1 class="screen-title" id="screenTitle">أذكار الصباح</h1>
            <div class="screen-subtitle" id="screenSubtitle">الذكر الحالي</div>
            <div class="azkar-display">
                <p class="azkar-text" id="azkarText">جاري تحميل الذكر الفخم...</p>
            </div>
            <div class="counter-section">
                <div class="counter-ring" onclick="countClick()">
                    <span class="counter-val" id="counterVal">0</span>
                </div>
                <button class="skip-btn" onclick="nextItem()">الذكر التالي ❯</button>
            </div>
        </div>

        <div id="quranScreen" class="screen">
            <div id="surahListView" style="width: 100%;">
                <h1 class="screen-title">المصحف الشريف</h1>
                <div class="screen-subtitle">اختر سورة لقراءتها بالرسم العثماني كاملاً</div>
                <div class="quran-list" id="quranContainer">
                    <div class="surah-card"><span class="surah-name">جاري تحميل الفهرس الفاخر...</span></div>
                </div>
            </div>
            
            <div id="surahAyaView" class="surah-view">
                <button class="back-btn" onclick="showSurahList()">❮ العودة للفهرس</button>
                <h1 class="screen-title" id="selectedSurahName">اسم السورة</h1>
                <div class="quran-text-display" id="surahTextContainer">
                    جاري جلب الآيات الكريمة...
                </div>
            </div>
        </div>

        <div id="qiblaScreen" class="screen">
            <h1 class="screen-title">اتجاه القِبلة</h1>
            <div class="screen-subtitle">بوصلة رقمية لتحديد اتجاه مكة المكرمة</div>
            <div class="compass-container">
                <div class="compass-pointer"></div>
                <div class="compass-rose" id="compassRose">
                    <div class="kaaba-icon">🕋</div>
                </div>
            </div>
            <p style="margin-top: 40px; text-align: center; color: var(--text-muted); font-size: 0.9rem; max-width: 280px;" id="qiblaStatus">
                يرجى تفعيل الـ GPS وإمساك الجوال بشكل مسطح لتشغيل البوصلة.
            </p>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchScreen('azkar', this)">
                <span class="nav-icon">📿</span><span>الأذكار</span>
            </button>
            <button class="nav-item" onclick="switchScreen('quran', this)">
                <span class="nav-icon">📖</span><span>المصحف</span>
            </button>
            <button class="nav-item" onclick="switchScreen('qibla', this)">
                <span class="nav-icon">🧭</span><span>القبلة</span>
            </button>
        </nav>

    </div>
