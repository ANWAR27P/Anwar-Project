<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA COFFEE | Luxury App</title>
    <style>
        body { 
            /* خلفية كوفي فخمة قريبة من الصورة التي اخترتها */
            background: border-box linear-gradient(rgba(0,0,0,0.75), rgba(0,0,0,0.85)), 
                        url('https://images.unsplash.com/photo-1554118811-1e0d58224f24?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 20px;
        }
        .header { text-align: center; margin-top: 40px; margin-bottom: 50px; }
        .logo-text { color: #d4af37; font-size: 3.5rem; font-weight: 900; letter-spacing: 6px; text-shadow: 2px 4px 20px rgba(0,0,0,0.8); }
        
        .menu-container { max-width: 480px; margin: 0 auto; background: rgba(0, 0, 0, 0.5); padding: 20px; border-radius: 30px; backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.2); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .price-tag { color: #d4af37; font-weight: bold; font-size: 1.1rem; }
        
        .add-btn { background: #d4af37; border: none; color: black; padding: 10px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .add-btn:hover { background: #fff; transform: scale(1.05); }

        .cart-overlay { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); width: 85%; max-width: 400px; background: #d4af37; color: black; padding: 20px; border-radius: 25px; display: none; text-align: center; box-shadow: 0 15px 50px rgba(0,0,0,0.6); }
        .save-btn { background: black; color: white; border: none; padding: 12px; width: 100%; border-radius: 12px; margin-top: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">RA COFFEE</div>
        <div style="font-size: 0.9rem; letter-spacing: 3px; opacity: 0.8;">PREMIUM QUALITY</div>
    </div>
    
    <div class="menu-container">
        <div class="item">
            <div><strong>كورتادو</strong><div style="font-size: 0.8rem; opacity: 0.6;">Cortado</div></div>
            <div><span class="price-tag">16 SR</span> <button class="add-btn" onclick="saveToCart('كورتادو', 16)">حفظ في السلة</button></div>
        </div>
        <div class="item">
            <div><strong>فلات وايت</strong><div style="font-size: 0.8rem; opacity: 0.6;">Flat White</div></div>
            <div><span class="price-tag">18 SR</span> <button class="add-btn" onclick="saveToCart('فلات وايت', 18)">حفظ في السلة</button></div>
        </div>
        <div class="item">
            <div><strong>آيس لاتيه</strong><div style="font-size: 0.8rem; opacity: 0.6;">Iced Latte</div></div>
            <div><span class="price-tag">21 SR</span> <button class="add-btn" onclick="saveToCart('آيس لاتيه', 21)">حفظ في السلة</button></div>
        </div>
    </div>

    <div id="cartStatus" class="cart-overlay">
        <div style="font-size: 1.1rem;">تم حفظ <span id="itemCount">0</span> طلبات في السلة</div>
        <div style="font-weight: bold; font-size: 1.3rem;">المجموع: <span id="cartTotal">0</span> SR</div>
        <button class="save-btn" onclick="alert('تم حفظ طلبك بنجاح في ذاكرة التطبيق!')">تأكيد الحفظ</button>
    </div>

    <script>
        let count = 0;
        let total = 0;

        function saveToCart(name, price) {
            count++;
            total += price;
            document.getElementById('cartStatus').style.display = 'block';
            document.getElementById('itemCount').innerText = count;
            document.getElementById('cartTotal').innerText = total;
            console.log("Saved to cart: " + name);
        }
    </script>
</body>
</html>
