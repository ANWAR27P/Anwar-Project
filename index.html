<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC | Luxury Store</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { 
            --accent: #5c9ead; 
            --bg-dark: #121214;
            --card-bg: #1e1e22; 
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #27272a;
            --danger: #ff4d4d;
            --success: #25d366;
            --warning: #ffca28;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: -apple-system, BlinkMacSystemFont, sans-serif; direction: rtl; text-align: right; padding-bottom: 100px; }
        
        /* البار العلوي الثابت */
        .top-navbar { position: sticky; top: 0; z-index: 999; background: #141416; padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border-color); }
        .brand-name { font-weight: 700; font-size: 1.4rem; color: #fff; }
        .brand-name span { color: var(--accent); }
        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        
        .admin-toggle-btn { background: none; border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: 0.2s; }
        .admin-toggle-btn.active { background: #27272a; color: #fff; border-color: var(--accent); }
        
        .cart-btn { background: var(--accent); color: white; border: none; padding: 8px 16px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; position: relative; }
        .cart-badge { background: var(--danger); color: white; font-size: 0.75rem; padding: 2px 7px; border-radius: 50%; position: absolute; top: -5px; right: -5px; }
        
        /* أدوات البحث والتصنيفات */
        .search-filter-area { max-width: 600px; margin: 20px auto 10px; padding: 0 20px; }
        .search-input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); font-size: 0.95rem; outline: none; margin-bottom: 12px; }
        .search-input:focus { border-color: var(--accent); }
        
        .filter-tabs { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 5px; }
        .filter-tab { background: var(--card-bg); border: 1px solid var(--border-color); color: var(--text-muted); padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 0.85rem; white-space: nowrap; transition: 0.2s; }
        .filter-tab.active, .filter-tab:hover { background: var(--accent); color: #fff; border-color: var(--accent); }

        /* الحاويات والكروت */
        .store-container { padding: 10px 20px; max-width: 600px; margin: 0 auto; }
        .category-title { margin: 15px 0; font-size: 1.2rem; font-weight: 700; color: #fff; border-right: 3px solid var(--accent); padding-right: 10px; }
        
        .clothing-card { background: var(--card-bg); border-radius: 14px; display: flex; align-items: center; padding: 14px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .clothing-img { width: 90px; height: 115px; border-radius: 8px; object-fit: cover; background: #141416; }
        .clothing-details { flex: 1; margin-right: 15px; display: flex; flex-direction: column; justify-content: center; }
        .clothing-details h3 { margin: 0 0 4px 0; font-size: 1.1rem; color: #fff; }
        .clothing-details p { margin: 0 0 4px 0; color: var(--text-muted); font-size: 0.85rem; }
        
        .rating-stars { color: var(--warning); font-size: 0.85rem; margin-bottom: 4px; }
        
        /* مؤشر التوفر العجيب للتسويق بالندرة */
        .stock-indicator { font-size: 0.78rem; color: var(--danger); font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
        
        .action-area { text-align: left; min-width: 95px; display: flex; flex-direction: column; justify-content: space-between; align-items: flex-end; gap: 10px; }
        .item-price { color: #fff; font-weight: 700; font-size: 1.1rem; display: block; }
        .buy-btn { background: none; border: 1px solid var(--accent); color: var(--accent); padding: 6px 12px; border-radius: 6px; cursor: pointer; font-weight: 600; transition: 0.2s; width: 100%; text-align: center; }
        .buy-btn:hover { background: var(--accent); color: white; }
        
        .delete-product-btn { background: none; border: none; color: #52525b; cursor: pointer; font-size: 0.8rem; transition: 0.2s; padding: 2px 5px; margin-top: 5px; }
        .delete-product-btn:hover { color: var(--danger); }

        /* السلة الجانبية المحسنة */
        .cart-sidebar { position: fixed; top: 0; left: -100%; width: 100%; max-width: 400px; height: 100%; background: #16161a; z-index: 1000; box-shadow: 5px 0 15px rgba(0,0,0,0.5); transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); }
        .cart-sidebar.open { left: 0; }
        .cart-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 1px solid var(--border-color); padding-bottom: 10px; }
        .close-cart { background: none; border: none; color: white; font-size: 1.5rem; cursor: pointer; }
        
        /* بار الشحن المجاني التفاعلي */
        .shipping-progress-container { background: #222; border-radius: 8px; padding: 10px; margin-bottom: 15px; border: 1px solid var(--border-color); }
        .shipping-text { font-size: 0.82rem; margin-bottom: 6px; color: var(--text-main); }
        .shipping-bar-bg { width: 100%; height: 6px; background: #333; border-radius: 3px; overflow: hidden; }
        .shipping-bar-fill { width: 0%; height: 100%; background: var(--accent); transition: width 0.4s ease; }

        .cart-items-list { flex: 1; overflow-y: auto; margin-bottom: 15px; }
        .cart-item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; border-bottom: 1px solid #222; }
        .cart-item-info h4 { font-size: 0.95rem; color: #fff; margin-bottom: 4px; }
        .cart-item-size { font-size: 0.78rem; color: var(--accent); background: rgba(92, 158, 173, 0.1); padding: 2px 6px; border-radius: 4px; display: inline-block; margin-bottom: 4px; }
        
        .quantity-control { display: flex; align-items: center; gap: 8px; margin-top: 5px; }
        .qty-btn { background: #27272a; border: none; color: white; width: 24px; height: 24px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9rem; }
        .qty-number { font-size: 0.9rem; color: #fff; min-width: 15px; text-align: center; }
