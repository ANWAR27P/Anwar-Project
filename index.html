<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA COFFEE | Right-Aligned Menu</title>
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.85), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', sans-serif; 
            margin: 0;
            padding: 20px;
        }
        /* خانة اكتمال الطلب العلوية */
        .top-checkout {
            position: sticky;
            top: 10px;
            z-index: 1000;
            background: rgba(212, 175, 55, 0.95);
            color: black;
            padding: 15px;
            border-radius: 20px;
            text-align: center;
            max-width: 500px;
            margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-weight: bold;
        }
        .complete-btn {
            background: black;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.9rem;
        }

        .header { text-align: center; margin-bottom: 20px; }
        .logo-text { color: #d4af37; font-size: 3rem; font-weight: 900; letter-spacing: 5px; }
        
        .section-title { color: #d4af37; font-size: 1.4rem; margin: 30px auto 15px; max-width: 500px; border-right: 4px solid #d4af37; padding-right: 15px; text-align: right; font-weight: bold; }
        
        /* جعل محتوى المنيو محاذى لليمين */
        .menu-container { max-width: 500px; margin: 0 auto 20px; background: rgba(255, 255, 255, 0.04); padding: 10px; border-radius: 25px; backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.05); }
        
        .item { display: flex; justify-content: space-between; align-items: center; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item:last-child { border-bottom: none; }
        
        .product-info { display: flex; align-items: center; text-align: right; flex-grow: 1; }
        .product-img { width: 65px; height: 65px; border-radius: 12px; object-fit: cover; margin-left: 15px; border: 1px solid rgba(212, 175, 55, 0.2); }
        
        .price-btn-group { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; min-width: 80px; }
        .price-tag { color: #d4af37; font-weight: bold; font-size: 0.9rem; }
        
        .buy-btn { background: #d4af37; border: none; color: black; padding: 6px 15px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: 0.3s; }
        .buy-btn:hover { background: #fff; transform: scale(1.05); }
    </style>
</head>
<body>

    <div class="top-checkout">
        <div>المجموع: <span id="cartTotal">0</span> SR</div>
        <button class="complete-btn" onclick="completeOrder()">اكتمال الطلب</button>
    </div>

    <div class="header">
        <div class="logo-text">RA COFFEE</div>
    </div>
    
    <!-- القهوة الحارة -->
    <div class="section-title">القهوة الحارة</div>
    <div class="menu-container">
        <div class="item">
            <div class="product-info">
                <img src="https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=200" class="product-img">
                <div><strong>إسبريسو</strong><span>Espresso</span></div>
            </div>
            <div class="price-btn-group">
                <span class="price-tag">12 SR</span>
                <button class="buy-btn" onclick="addToCart(12)">شراء</button>
            </div>
        </div>
        <div class="item">
            <div class="product-info">
                <img src="https://images.unsplash.com/photo-1534706936160-d5ee67737049?w=200" class="product-img">
                <div><strong>كورتادو</strong><span>Cortado</span></div>
            </div>
            <div class="price-btn-group">
                <span class="price-tag">16 SR</span>
                <button class="buy-btn" onclick="addToCart(16)">شراء</button>
            </div>
        </div>
    </div>

    <!-- القهوة الباردة (تم إضافة V60 بارد) -->
    <div class="section-title">القهوة الباردة</div>
    <div class="menu-container">
        <div class="item">
            <div class="product-info">
                <img src="https://images.unsplash.com/photo-1499961024600-ad094db305cc?w=200" class="product-img">
                <div><strong>V60 بارد</strong><span>V60 Iced</span></div>
            </div>
            <div class="price-btn-group">
                <span class="price-tag">26 SR</span>
                <button class="buy-btn" onclick="addToCart(26)">شراء</button>
            </div>
        </div>
        <div class="item">
            <div class="product-info">
                <img src="https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=200" class="product-img">
                <div><strong>آيس لاتيه</strong><span>Iced Latte</span></div>
            </div>
            <div class="price-btn-group">
                <span class="price-tag">21 SR</span>
                <button class="buy-btn" onclick="addToCart(21)">شراء</button>
            </div>
        </div>
    </div>

    <!-- الحلى الفاخر -->
    <div class="section-title">الحلى الفاخر</div>
    <div class="menu-container">
        <div class="item">
            <div class="product-info">
                <img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=200" class="product-img">
                <div><strong>تيراميسو</strong><span>Tiramisu</span></div>
            </div>
            <div class="price-btn-group">
                <span class="price-tag">32 SR</span>
                <button class="buy-btn" onclick="addToCart(32)">شراء</button>
            </div>
        </div>
    </div>

    <script>
        let total = 0;
        function addToCart(price) {
            total += price;
            document.getElementById('cartTotal').innerText = total;
        }
        function completeOrder() {
            if(total > 0) {
                alert('تم استلام طلبك في RA COFFEE! الإجمالي: ' + total + ' SR');
            } else {
                alert('يرجى اختيار صنف أولاً.');
            }
        }
    </script>
</body>
</html>
