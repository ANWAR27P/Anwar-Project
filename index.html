<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC | Luxury Store</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { 
            --accent: #5c9ead; 
            --bg-dark: #121214;
            --card-bg: #1e1e22; 
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #27272a;
        }
        body { 
            background: var(--bg-dark); 
            color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 0; 
            direction: rtl; text-align: right;
        }
        .top-navbar { 
            position: sticky; top: 0; z-index: 99; 
            background: var(--bg-dark); padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }
        .brand-name { font-weight: 700; font-size: 1.4rem; letter-spacing: 1px; }
        .brand-name span { color: var(--accent); }
        
        .admin-toggle-btn { 
            background: none; border: 1px solid var(--accent); 
            color: var(--accent); padding: 6px 14px; border-radius: 6px; 
            cursor: pointer; font-size: 0.85rem; 
        }
        
        .store-container { padding: 20px; max-width: 600px; margin: 0 auto; }
        
        .category-title { 
            margin: 25px 0 15px; font-size: 1.2rem; font-weight: 700; 
            display: flex; align-items: center; gap: 12px; 
        }
        .category-title::after { content: ''; flex: 1; height: 1px; background: var(--border-color); }
        
        /* كروت المنتجات الفخمة */
        .clothing-card { 
            background: var(--card-bg); border-radius: 14px; 
            display: flex; align-items: center; padding: 14px; 
            margin-bottom: 15px; border: 1px solid var(--border-color); 
        }
        .clothing-img { width: 80px; height: 100px; border-radius: 8px; object-fit: cover; background: #141416; }
        .clothing-details { flex: 1; margin-right: 15px; }
        .clothing-details h3 { margin: 0 0 5px 0; font-size: 1.1rem; }
        .clothing-details p { margin: 0; color: var(--text-muted); font-size: 0.85rem; }
        
        .action-side { text-align: left; min-width: 80px; }
        .item-price { color: var(--text-main); font-weight: 700; display: block; margin-bottom: 8px; font-size: 1.1rem; }
        
        /* لوحة التحكم الأسفل */
        .admin-panel { 
            background: #19191c; padding: 20px; 
            margin: 40px auto 60px; border-radius: 16px; 
            border: 1px solid var(--border-color); max-width: 550px; 
        }
        .admin-panel h2 { margin-top: 0; font-size: 1.1rem; text-align: center; margin-bottom: 15px; }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.85rem; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border-radius: 8px; 
            border: 1px solid var(--border-color); background: var(--card-bg); 
            color: var(--text-main); box-sizing: border-box; 
        }
        .add-product-btn { 
            width: 100%; background: var(--accent); color: #fff; 
            border: none; padding: 12px; border-radius: 8px; 
            font-weight: 600; cursor: pointer; margin-top: 5px; 
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="brand-name">ASC<span>STUDIO</span></div>
        <button class="admin-toggle-btn" onclick="document.getElementById('admin-section').scrollIntoView({behavior: 'smooth'})">🛠️ إضافة منتج</button>
    </div>

    <div class="store-container">
        <div id="section-apparel" style="display:none;"><div class="category-title">قسم الملابس</div></div>
        <div id="container-apparel"></div>
        
        <div id="section-footwear" style="display:none;"><div class="category-title">قسم الأحذية</div></div>
        <div id="container-footwear"></div>
    </div>

    <div class="store-container" id="admin-section">
        <div class="admin-panel">
            <h2>🛠️ لوحة إضافة المنتجات السريعة</h2>
            <div class="form-group"><label>اسم المنتج:</label><input type="text" id="prod-name" placeholder="مثال: تيشيرت أبيض فاخر"></div>
            <div class="form-group"><label>الوصف / المقاس:</label><input type="text" id="prod-desc" placeholder="مثال: مقاس M قطن ناعم"></div>
            <div class="form-group"><label>رابط الصورة (اختياري):</label><input type="text" id="prod-img" placeholder="رابط صورة المنتج من الإنترنت"></div>
            <div class="form-group"><label>السعر (RS):</label><input type="number" id="prod-price" placeholder="مثال: 120"></div>
            <div class="form-group">
                <label>القسم:</label>
                <select id="prod-category">
                    <option value="apparel">ملابس</option>
                    <option value="footwear">أحذية</option>
                </select>
            </div>
            <button class="add-product-btn" onclick="saveProductToFirebase()">حفظ ونشر في المتجر فوراً ✨</button>
        </div>
    </div>

    <script>
        // إعدادات قاعدة البيانات الخاصة بـ أنور المضمونة
        const firebaseConfig = {
            apiKey: "AIzaSyCdDzXJ-Qvbj2IoCWLQfaMK5IR6Q_gVdpY",
            authDomain: "asc-studio-5272d.firebaseapp.com",
            databaseURL: "https://asc-studio-5272d-default-rtdb.firebaseio.com",
            projectId: "asc-studio-5272d",
            storageBucket: "asc-studio-5272d.firebasestorage.app",
            messagingSenderId: "809855684821",
            appId: "1:809855684821:web:dd6bc79fa69be290de25ca"
        };
        
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // قراءة وعرض المنتجات مباشرة بدون أي تأخير
        database.ref('products').on('value', (snapshot) => {
            document.getElementById('container-apparel').innerHTML = '';
            document.getElementById('container-footwear').innerHTML = '';
            document.getElementById('section-apparel').style.display = 'none';
            document.getElementById('section-footwear').style.display = 'none';

            const products = snapshot.val();
            if (products) {
                Object.keys(products).forEach((key) => {
                    const prod = products[key];
                    
                    // إظهار عنوان القسم إذا كان يحتوي على منتجات
                    if(document.getElementById(`section-${prod.category}`)) {
                        document.getElementById(`section-${prod.category}`).style.display = "block";
                    }
                    
                    const cardHTML = `
                        <div class="clothing-card">
                            <img src="${prod.img || 'https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400'}" class="clothing-img">
                            <div class="clothing-details">
                                <h3>${prod.name}</h3>
                                <p>${prod.desc}</p>
                            </div>
                            <div class="action-side">
                                <span class="item-price">${prod.price} RS</span>
                            </div>
                        </div>
                    `;
                    
                    const container = document.getElementById(`container-${prod.category}`);
                    if(container) {
                        container.insertAdjacentHTML('beforeend', cardHTML);
                    }
                });
            }
        });

        // دالة حفظ المنتج الجديد
        function saveProductToFirebase() {
            const name = document.getElementById('prod-name').value;
            const desc = document.getElementById('prod-desc').value;
            const img = document.getElementById('prod-img').value;
            const price = parseInt(document.getElementById('prod-price').value);
            const category = document.getElementById('prod-category').value;

            if(!name || !price) { alert("يرجى تعبئة الاسم والسعر كحد أدنى."); return; }

            database.ref('products').push({
                name: name, desc: desc, img: img, price: price, category: category
            }).then(() => {
                alert("تم الحفظ بنجاح وظهوره بالمتجر! 🎉");
                document.getElementById('prod-name').value = '';
                document.getElementById('prod-desc').value = '';
                document.getElementById('prod-img').value = '';
                document.getElementById('prod-price').value = '';
            });
        }
    </script>
</body>
</html>
