<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتبقي على المناسبة السعيدة</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #f5f0eb;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* شاشة الدخول الترحيبية */
        .welcome-card {
            background-color: #141414;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #c9a0dc;
            text-align: center;
            width: 100%;
            box-sizing: border-box;
        }

        .welcome-card h2 {
            color: #d4af37;
            margin-bottom: 25px;
            font-size: 24px;
        }

        .start-btn {
            background-color: #f5f0eb;
            color: #0d0d0d;
            border: none;
            padding: 14px 35px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
        }

        .start-btn:hover {
            transform: scale(1.03);
            background-color: #e5dfda;
        }

        /* اللوحة الرئيسية للعداد */
        #mainDashboard {
            width: 100%;
        }

        .title {
            color: #d4af37;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            letter-spacing: 0.5px;
            text-align: center;
        }

        /* العداد التنازلي المطابق للصورة */
        .countdown-board {
            display: flex;
            justify-content: space-around;
            background-color: #141414;
            padding: 25px 15px;
            border-radius: 12px;
            margin-bottom: 40px;
            border: 1px solid #222222;
            width: 100%;
            box-sizing: border-box;
        }

        .countdown-block {
            text-align: center;
            flex: 1;
        }

        .countdown-number {
            font-size: 40px;
            font-weight: bold;
            color: #d4af37;
            display: block;
            margin-bottom: 5px;
            line-height: 1;
        }

        .countdown-label {
            font-size: 14px;
            color: #f5f0eb;
        }

        /* جدول المهام والمتابعة */
        .section-title {
            color: #d4af37;
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .task-board {
            background-color: #141414;
            border-radius: 12px;
            padding: 10px 20px;
            border: 1px solid #222222;
            width: 100%;
            box-sizing: border-box;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #1c1c1c;
        }

        .task-row:last-child {
            border-bottom: none;
        }

        .task-name {
            color: #f5f0eb;
            font-size: 16px;
        }

        .status-working {
            color: #d4af37;
            font-weight: bold;
            font-size: 16px;
        }

        .status-completed {
            color: #2ecc71;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>
<body>

        </div>

            <div class="section-title">📝 جدول المهام والمتابعة:</div>

                    <span class="task-name">حجز فرقة الزفة والصوت</span>

            </div>
        </div>
    </div>
