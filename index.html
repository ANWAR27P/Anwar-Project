<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اطمئن</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-dark: #07080a;
            --panel-bg: #11141a;
            --gold-premium: #d4af37;
            --gold-glow: rgba(212, 175, 55, 0.25);
            --text-main: #f5f6fa;
            --text-muted: #7f8c8d;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .app-window {
            width: 100%;
            max-width: 460px;
            height: 100vh;
            background-color: var(--bg-dark);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
        }

        @media (min-width: 480px) {
            .app-window {
                height: 880px;
                border-radius: 32px;
                border: 1px solid rgba(212, 175, 55, 0.2);
            }
        }

        .screen {
            flex-grow: 1;
            display: none;
            flex-direction: column;
            padding: 30px 20px 90px 20px;
            overflow-y: auto;
            align-items: center;
        }

        .screen.active {
            display: flex;
        }

        .screen-title {
            font-family: 'Amiri', serif;
            color: var(--gold-premium);
            font-size: 2.2rem;
            margin: 0 0 5px 0;
            text-shadow: 0 0 10px var(--gold-glow);
            text-align: center;
        }

        .screen-subtitle {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 25px;
            text-align: center;
        }

        .azkar-display {
            width: 100%;
            text-align: center;
            margin-top: 20px;
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .azkar-text {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            line-height: 2.6rem;
            color: var(--text-main);
            width: 100%;
            margin: 0;
            max-height: 280px;
            overflow-y: auto;
        }

        .counter-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
        }

        .counter-ring {
            width: 150px;
            height: 150px;
            border-radius: 50%;
            border: 2px dashed var(--gold-premium);
            background: radial-gradient(circle, #1a1e24 0%, #0f1115 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 25px var(--gold-glow);
            cursor: pointer;
            margin-bottom: 15px;
            transition: transform 0.1s;
        }

        .counter-ring:active { transform: scale(0.95); }

        .counter-val {
            font-size: 3.2rem;
            color: var(--gold-premium);
            font-weight: bold;
        }

        .quran-list {
            width: 100%;
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        .surah-card {
            background-color: var(--panel-bg);
            border: 1px solid rgba(212, 175, 55, 0.1);
            padding: 15px 20px;
            border-radius: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .surah-card:hover { border-color: var(--gold-premium); }
        .surah-name { font-family: 'Amiri', serif; font-size: 1.4rem; color: var(--text-main); }
        .surah-meta { font-size: 0.8rem; color: var(--text-muted); }

        .surah-view {
            display: none;
            width: 100%;
            flex-direction: column;
        }
        .quran-header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            margin-bottom: 15px;
        }
        .back-btn {
            background: none;
            border: 1px solid var(--gold-premium);
            color: var(--gold-premium);
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .quran-text-display {
            font-family: 'Amiri', serif;
            font-size: 1.9rem;
            line-height: 3.4rem;
            text-align: justify;
            color: var(--text-main);
            background-color: var(--panel-bg);
            padding: 25px;
            border-radius: 16px;
            border: 1px solid rgba(212, 175, 55, 0.15);
            max-height: 520px;
            overflow-y: auto;
        }

        .compass-container {
            position: relative;
            width: 260px;
            height: 260px;
            margin-top: 30px;
        }

        .compass-rose {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--gold-premium);
            background: radial-gradient(circle, #13161b 60%, #0a0b0d 100%);
            position: absolute;
            transition: transform 0.1s linear;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.2);
        }

        .compass-pointer {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 4px;
            height: 40px;
            background-color: #e74c3c;
            border-radius: 2px;
            z-index: 5;
        }

        .kaaba-icon {
            position: absolute;
            top: 25px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 1.8rem;
            color: var(--gold-premium);
        }

        .activate-btn {
            background: linear-gradient(135deg, #d4af37 0%, #aa820a 100%);
            color: #000;
            border: none;
            padding: 12px 28px;
            border-radius: 25px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.95rem;
            margin-top: 20px;
            box-shadow: 0 4px 15px rgba(212, 175, 55, 0.3);
            font-family: 'Tajawal', sans-serif;
        }

        .bottom-nav {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 75px;
            background-color: var(--panel-bg);
            border-top: 1px solid rgba(212, 175, 55, 0.15);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding-bottom: env(safe-area-inset-bottom);
            z-index: 10;
        }

        .nav-item {
            background: none;
            border: none;
            color: var(--text-muted);
            font-family: 'Tajawal', sans-serif;
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            transition: 0.3s;
        }

        .nav-item.active {
            color: var(--gold-premium);
            font-weight: bold;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.3);
        }

        .nav-icon { font-size: 1.3rem; }

        .skip-btn {
            background: transparent;
            border: 1px solid rgba(212, 175, 55, 0.2);
            color: var(--text-main);
            padding: 8px 18px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="app-window">
        
        <div id="azkarScreen" class="screen active">
            <h1 class="screen-title" id="screenTitle">أذكار المسلم</h1>
            <div class="screen-subtitle" id="screenSubtitle">الورد الحالي</div>
            <div class="azkar-display">
                <p class="azkar-text" id="azkarText">جاري تحميل الذكر...</p>
            </div>
            <div class="counter-section">
                <div class="counter-ring" onclick="countClick()">
                    <span class="counter-val" id="counterVal">0</span>
                </div>
                <button class="skip-btn" onclick="nextItem()">الذكر التالي ❯</button>
            </div>
        </div>

        <div id="quranScreen" class="screen">
            <div id="surahListView" style="width: 100%;">
                <h1 class="screen-title">المصحف الشريف</h1>
                <div class="screen-subtitle">اختر سورة لقراءتها بالرسم العثماني</div>
                <div class="quran-list" id="quranContainer">
                    <div class="surah-card"><span class="surah-name">جاري تحميل الفهرس...</span></div>
                </div>
            </div>
            
            <div id="surahAyaView" class="surah-view">
                <div class="quran-header-nav">
                    <button class="back-btn" onclick="showSurahList()">❮ الفهرس</button>
                    <h1 class="screen-title" id="selectedSurahName" style="font-size: 1.8rem; margin:0;">اسم السورة</h1>
                </div>

                <div class="quran-text-display" id="surahTextContainer">
                    جاري جلب الآيات الكريمة...
                </div>
            </div>
        </div>

        <div id="qiblaScreen" class="screen">
            <h1 class="screen-title">اتجاه القِبلة</h1>
            <div class="screen-subtitle">بوصلة رقمية دقيقة لتحديد اتجاه مكة المكرمة</div>
            <div class="compass-container">
                <div class="compass-pointer"></div>
                <div class="compass-rose" id="compassRose">
                    <div class="kaaba-icon">🕋</div>
                </div>
            </div>
            <button class="activate-btn" onclick="requestCompassPermission()">تفعيل واستشعار البوصلة 🧭</button>
            <p style="margin-top: 20px; text-align: center; color: var(--text-muted); font-size: 0.9rem; max-width: 280px;" id="qiblaStatus">
                اضغط على الزر بالأعلى، واقبل الصلاحية لتشغيل البوصلة التفاعلية.
            </p>
        </div>

        <nav class="bottom-nav">
            <button class="nav-item active" onclick="switchScreen('azkar', this)">
                <span class="nav-icon">📿</span><span>الأذكار</span>
            </button>
            <button class="nav-item" onclick="switchScreen('quran', this)">
                <span class="nav-icon">📖</span><span>المصحف</span>
            </button>
            <button class="nav-item" onclick="switchScreen('qibla', this)">
                <span class="nav-icon">🧭</span><span>القبلة</span>
            </button>
        </nav>

    </div>

    <script>
        // مصفوفة الأذكار المستقرة والنظيفة بالكامل
        const azkarData = [
            { id: 1, category: "أذكار الصباح", text: "أَعُوذُ بِاللهِ مِنَ الشَّيْطَانِ الرَّجِيمِ: {اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ وَلَا يَئُودُهُ حِفْظُهُمَا وَهُوَ الْ
