<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المتبقي على المناسبة السعيدة</title>
    <style>
        body {
            background-color: #0d0d0d;
            color: #f5f0eb;
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            max-width: 600px;
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .title {
            color: #d4af37;
            font-size: 28px;
            font-weight: bold;
            margin-bottom: 30px;
            text-align: center;
        }

        /* العداد التنازلي المطابق تماماً لتصميمك الأصلي */
        .countdown-board {
            display: flex;
            justify-content: space-around;
            background-color: #141414;
            padding: 25px 15px;
            border-radius: 12px;
            margin-bottom: 40px;
            border: 1px solid #222222;
            width: 100%;
            box-sizing: border-box;
            gap: 10px;
        }

        .countdown-block {
            text-align: center;
            flex: 1;
        }

        .countdown-number {
            font-size: 40px;
            font-weight: bold;
            color: #d4af37;
            display: block;
            margin-bottom: 5px;
            line-height: 1;
        }

        .countdown-label {
            font-size: 14px;
            color: #f5f0eb;
        }

        /* جدول المهام والمتابعة */
        .section-title {
            color: #d4af37;
            font-size: 20px;
            margin-bottom: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
        }

        .task-board {
            background-color: #141414;
            border-radius: 12px;
            padding: 10px 20px;
            border: 1px solid #222222;
            width: 100%;
            box-sizing: border-box;
        }

        .task-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 18px 0;
            border-bottom: 1px solid #1c1c1c;
        }

        .task-row:last-child {
            border-bottom: none;
        }

        .task-name {
            color: #f5f0eb;
            font-size: 16px;
        }

        .status-working {
            color: #d4af37;
            font-weight: bold;
            font-size: 16px;
        }

        .status-completed {
            color: #2ecc71;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

                <div class="countdown-block">

                    <span class="countdown-label">دقائق</span>

                <div class="countdown-block">
                    <span class="countdown-number" id="seconds">00</span>
                    <span class="countdown-label">ثواني</span>
                </div>
            </div>

            <div class="section-title">📋 جدول المهام والمتابعة:</div>

                    <span class="task-name">حجز فرقة الزفة والصوت</span>

            </div>
        </div>
    </div>
