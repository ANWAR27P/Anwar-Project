<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة المناسبة الفخمة</title>
    <style>
        body {
            background-color: '#0d0d0d';
            background: radial-gradient(circle, #1a1a1a 0%, #0d0d0d 100%);
            color: #f5f0eb;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            text-align: center;
        }
        .container {
            max-width: 600px;
            width: 90%;
            padding: 20px;
        }
        .card {
            background-color: #1a1a1a;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            border: 1px solid #d4af37;
        }
        h1, h2, h3 {
            color: #d4af37;
            margin-bottom: 20px;
        }
        button {
            background-color: #f5f0eb;
            color: #0d0d0d;
            border: none;
            padding: 12px 35px;
            fontSize: 18px;
            font-weight: bold;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(245,240,235,0.2);
        }
        button:hover {
            transform: scale(1.05);
            background-color: #e5dfda;
        }
        .countdown {
            display: flex;
            justify-content: space-around;
            background-color: #161616;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 40px;
            border: 1px solid #2a2a2a;
        }
        .countdown-item {
            font-size: 14px;
            color: #f5f0eb;
        }
        .countdown-item span {
            font-size: 32px;
            display: block;
            color: #d4af37;
            font-weight: bold;
        }
        .task-list {
            background-color: #161616;
            border-radius: 10px;
            padding: 15px;
            border: 1px solid #2a2a2a;
            text-align: right;
        }
        .task-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #222;
        }
        .task-item:last-child {
            border-bottom: none;
        }
        .status-working { color: #f1c40f; font-weight: bold; }
        .status-done { color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>

    <div class="container">
        <audio id="bgAudio" src="https://archive.org/download/entazartak-badr/entazartak.mp3" loop></audio>

        <div id="welcomeScreen" class="card">
            <h2>مرحباً بك في لوحة المناسبة الفخمة</h2>
            <p style="color: #a0a0a0; margin-bottom: 30px;">اضغط على زر الدخول للاستماع للقصيدة وعرض العداد</p>
            <button onclick="startDashboard()">دخول اللوحة وتشغيل الصوت</button>
        </div>

        <div id="mainDashboard" style="display: none;">
            <h1>المتبقي على المناسبة السعيدة</h1>
            
            <div class="countdown">
                <div class="countdown-item"><span id="days">0</span>أيام</div>
                <div class="countdown-item"><span id="hours">0</span>ساعات</div>
                <div class="countdown-item"><span id="minutes">0</span>دقائق</div>
                <div class="countdown-item"><span id="seconds">0</span>ثواني</div>
            </div>

            <h3>📋 جدول المهام والمتابعة:</h3>
            <div class="task-list">
                <div class="task-item">
                    <span>تجهيز ديكور قاعة التهاني</span>
                    <span class="status-working">جاري العمل</span>
                </div>
                <div class="task-item">
                    <span>حجز فرقة الزفة والصوت</span>
                    <span class="status-done">مكتمل</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        // دالة الدخول وتشغيل الصوت
        function startDashboard() {
            document.getElementById('welcomeScreen').style.display = 'none';
            document.getElementById('mainDashboard').style.display = 'block';
            
            var audio = document.getElementById('bgAudio');
            audio.play().catch(function(error) {
                console.log("Audio play blocked:", error);
            });
        }

        // حساب العداد التنازلي لموعد المناسبة (15 أغسطس 2026)
        const targetDate = new Date("2026-08-15T00:00:00").getTime();

        const timerInterval = setInterval(function() {
            const now = new Date().getTime();
            const difference = targetDate - now;

            if (difference > 0) {
                const days = Math.floor(difference / (1000 * 60 * 60 * 24));
                const hours = Math.floor((difference % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
                const minutes = Math.floor((difference % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((difference % (1000 * 60)) / 1000);

                document.getElementById("days").innerText = days;
                document.getElementById("hours").innerText = hours;
                document.getElementById("minutes").innerText = minutes;
                document.getElementById("seconds").innerText = seconds;
            } else {
                clearInterval(timerInterval);
            }
        }, 1000);
    </script>
</body>
</html>
