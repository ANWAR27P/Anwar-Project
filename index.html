<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق اطمئن</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #07080a; --gold: #d4af37; --text: #f5f6fa; --panel: #11141a; }
        body { font-family: 'Tajawal', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .app-window { width: 100%; max-width: 400px; height: 100vh; background: var(--bg); display: flex; flex-direction: column; position: relative; overflow: hidden; border: 1px solid #333; }
        .screen { flex-grow: 1; display: none; flex-direction: column; padding: 30px 20px; align-items: center; overflow-y: auto; }
        .screen.active { display: flex; }
        .screen-title { font-family: 'Amiri', serif; color: var(--gold); font-size: 2rem; margin-bottom: 20px; }
        .azkar-text { font-family: 'Amiri', serif; font-size: 1.5rem; line-height: 2.2; text-align: center; margin-bottom: 20px; color: #fff; min-height: 200px; }
        .counter-ring { width: 140px; height: 140px; border: 3px dashed var(--gold); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 3rem; color: var(--gold); cursor: pointer; margin-bottom: 20px; transition: 0.3s; }
        .nav-bar { height: 75px; background: var(--panel); border-top: 1px solid #222; display: flex; justify-content: space-around; align-items: center; }
        .nav-item { color: #7f8c8d; cursor: pointer; text-align: center; font-size: 0.9rem; }
        .nav-item.active { color: var(--gold); }
    </style>
</head>
<body>
    <div class="app-window">
        <div id="azkarScreen" class="screen active">
            <h1 class="screen-title">الورد الشامل</h1>
            <div id="azkarText" class="azkar-text">تحميل...</div>
            <div class="counter-ring" id="counterVal" onclick="countClick()">0</div>
            <button style="background:var(--gold); border:none; padding:12px 40px; border-radius:25px; cursor:pointer; font-weight:bold;" onclick="nextItem()">التالي ❯</button>
        </div>

        <nav class="nav-bar">
            <div class="nav-item active">📿<br>الأذكار</div>
            <div class="nav-item">📖<br>المصحف</div>
            <div class="nav-item">🧭<br>القبلة</div>
        </nav>
    </div>

    <script>
        const fullList = [
            { text: "آية الكرسي", count: 1 },
            { text: "سورة الإخلاص (3 مرات)", count: 3 },
            { text: "سورة الفلق (3 مرات)", count: 3 },
            { text: "سورة الناس (3 مرات)", count: 3 },
            { text: "أصبحنا وأصبح الملك لله، والحمد لله، لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير.", count: 1 },
            { text: "اللهم بك أصبحنا، وبك أمسينا، وبك نحيا، وبك نموت، وإليك النشور.", count: 1 },
            { text: "اللهم أنت ربي لا إله إلا أنت، خلقتني وأنا عبدك، وأنا على عهدك ووعدك ما استطعت، أعوذ بك من شر ما صنعت..", count: 1 },
            { text: "يا حي يا قيوم برحمتك أستغيث، أصلح لي شأني كله ولا تكلني إلى نفسي طرفة عين.", count: 1 },
            { text: "بسم الله الذي لا يضر مع اسمه شيء في الأرض ولا في السماء وهو السميع العليم (3 مرات).", count: 3 },
            { text: "رضيت بالله رباً، وبالإسلام ديناً، وبمحمد صلى الله عليه وسلم نبياً (3 مرات).", count: 3 },
            { text: "سبحان الله وبحمده (3 مرات).", count: 3 },
            { text: "لا إله إلا الله وحده لا شريك له، له الملك وله الحمد وهو على كل شيء قدير (10 مرات).", count: 10 },
            { text: "دعاء: اللهم إني أسألك علماً نافعاً، ورزقاً طيباً، وعملاً متقبلاً.", count: 1 },
            { text: "دعاء: ربنا آتنا في الدنيا حسنة، وفي الآخرة حسنة، وقنا عذاب النار.", count: 1 },
            { text: "دعاء: اللهم أعني على ذكرك وشكرك وحسن عبادتك.", count: 1 }
        ];

        let i = 0; let c = fullList[0].count;
        function update() {
            document.getElementById('azkarText').innerText = fullList[i].text;
            document.getElementById('counterVal').innerText = c;
        }
        function countClick() { if(c > 0) { c--; update(); if(c === 0) nextItem(); } }
        function nextItem() { i++; if(i < fullList.length) { c = fullList[i].count; update(); } else { document.getElementById('azkarText').innerText = "تمت الأذكار والأدعية، بارك الله في يومك."; document.getElementById('counterVal').innerText = "✓"; } }
        update();
    </script>
</body>
</html>
