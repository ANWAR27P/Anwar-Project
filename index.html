<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASC | Casual Store</title>
    <style>
        :root { 
            --accent: #5c9ead; /* لون سماوي رايق وهادي */
            --bg-dark: #121214;
            --card-bg: #1e1e22; 
            --text-muted: #a0a0ab;
        }
        
        body { 
            background: var(--bg-dark);
            color: #ffffff; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0; 
            padding: 0;
            overflow-x: hidden;
        }

        /* بار علوي بسيط ورايق */
        .top-navbar {
            position: sticky; top: 0; z-index: 1000; 
            background: rgba(18, 18, 20, 0.95);
            backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
            padding: 18px 25px; display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid #27272a;
        }
        .brand-name { font-weight: 700; font-size: 1.3rem; color: #fff; letter-spacing: 0.5px; }
        .brand-name span { color: var(--accent); font-weight: 400; font-size: 1rem; margin-right: 5px; }
        
        .checkout-top-btn { 
            background: #fff; color: #000; border: none; 
            padding: 8px 18px; border-radius: 8px; font-weight: 600; 
            cursor: pointer; font-size: 0.9rem; transition: background 0.2s;
        }
        .checkout-top-btn:hover { background: #e4e4e7; }

        /* سلة مشتريات عائمة دائرية بسيطة */
        .floating-cart-bag {
            position: fixed; bottom: 30px; left: 30px; 
            background: var(--accent); color: #fff; width: 55px; height: 55px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3); z-index: 999;
            font-weight: 700; font-size: 1.1rem; cursor: pointer;
            transition: transform 0.2s;
        }
        .floating-cart-bag:active { transform: scale(0.95); }

        /* عناوين المجموعات الهادية */
        .category-title { 
            margin: 40px 25px 15px; text-align: right; font-size: 1.15rem;
            font-weight: 600; color: #fff; display: flex; align-items: center; gap: 12px;
        }
        .category-title::after { content: ''; flex: 1; height: 1px; background: #27272a; }

        .store-container { padding: 0 20px 20px; max-width: 600px; margin: 0 auto; }

        /* كروت المنتجات بتصميم عادي ومريح */
        .clothing-card {
            background: var(--card-bg); border-radius: 14px; display: flex; align-items: center;
            padding: 14px; margin-bottom: 15px; border: 1px solid #27272a;
        }
        .clothing-img { width: 85px; height: 95px; border-radius: 8px; object-fit: cover; background: #141416; }
        
        .clothing-details { flex: 1; margin-right: 15px; text-align: right; }
        .clothing-details h3 { margin: 0 0 4px 0; font-size: 1.05rem; font-weight: 600; color: #fff; }
        .clothing-details p { margin: 0 0 6px 0; color: var(--text-muted); font-size: 0.85rem; }
        .rating-stars { color: var(--accent); font-size: 0.75rem; letter-spacing: 1px; }

        /* السعر والزر */
        .action-side { text-align: left; min-width: 85px; }
        .item-price { color: #fff; font-weight: 700; display: block; margin-bottom: 10px; font-size: 1.05rem; }
        .add-to-bag-btn { 
            background: #27272a; color: #fff; border: 1px solid #3f3f46; 
            padding: 6px 16px; border-radius: 8px; font-weight: 500; font-size: 0.85rem; cursor: pointer; width: 100%;
            transition: all 0.2s;
        }
        .add-to-bag-btn:active { background: #3f3f46; }

        /* لوحة التحكم الهادية في الأسفل */
        .admin-panel {
            background: #19191c; padding: 22px; margin: 40px 20px 100px; border-radius: 16px;
            border: 1px solid #27272a; max-width: 550px; margin-left: auto; margin-right: auto;
        }
        .admin-panel h2 { margin-top: 0; color: #fff; font-size: 1.2rem; font-weight: 600; text-align: center; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; text-align: right; }
        .form-group label { display: block; margin-bottom: 6px; color: var(--text-muted); font-size: 0.85rem; }
        .form-group input, .form-group select {
            width: 100%; padding: 11px; border-radius: 8px; border: 1px solid #27272a;
            background: #121214; color: #fff; box-sizing: border-box; font-size: 0.95rem;
        }
        .form-group input:focus, .form-group select:focus { border-color: var(--accent); outline: none; }
        
        .add-product-btn {
            width: 100%; background: var(--accent); color: #fff; border: none; padding: 12px;
            border-radius: 8px; font-weight: 600; font-size: 1rem; cursor: pointer; margin-top: 10px;
        }

        /* شاشة التأكيد البسيطة */
        .confirmation-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #121214; z-index: 2000; flex-direction: column; 
            justify-content: center; align-items: center; text-align: center;
        }
        .success-text { font-size: 1.8rem; font-weight: 600; color: #fff; margin-bottom: 10px; }
        .close-overlay-btn { 
            margin-top: 30px; background: #27272a; color: #fff; border: none; 
            padding: 10px 30px; border-radius: 8px; font-weight: 500; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="floating-cart-bag" onclick="showSuccessScreen()">
        <span id="bag-count">0</span>
    </div>

    <div class="top-navbar">
        <div class="brand-name">ASC<span>STORES</span></div>
        <button class="checkout-top-btn" onclick="showSuccessScreen()">تأكيد (<span id="total-price">0</span> RS)</button>
    </div>

    <div class="store-container">
        <div id="section-apparel" style="display: none;"><div class="category-title">الملابس</div></div>
        <div id="container-apparel"></div>

        <div id="section-footwear" style="display: none;"><div class="category-title">الأحذية</div></div>
        <div id="container-footwear"></div>

        <div id="section-accessories" style="display: none;"><div class="category-title">الإكسسوارات</div></div>
        <div id="container-accessories"></div>
    </div>

    <div class="admin-panel">
        <h2>🛠️ إضافة قطعة جديدة</h2>
        <div class="form-group">
            <label>اسم المنتج:</label>
            <input type="text" id="prod-name" placeholder="مثال: تيشرت قطن أساسي">
        </div>
        <div class="form-group">
            <label>وصف قصير:</label>
            <input type="text" id="prod-desc" placeholder="مثال: قصة مريحة وألوان هادية">
        </div>
        <div class="form-group">
            <label>السعر (RS):</label>
            <input type="number" id="prod-price" placeholder="مثال: 90">
        </div>
        <div class="form-group">
            <label>القسم:</label>
            <select id="prod-category">
                <option value="apparel">ملابس</option>
                <option value="footwear">أحذية</option>
                <option value="accessories">إكسسوارات</option>
            </select>
        </div>
        <button class="add-product-btn" onclick="addNewProduct()">إضافة للمتجر</button>
    </div>

    <div class="confirmation-overlay" id="success-screen">
        <div class="success-text">تم تأكيد طلبك بنجاح</div>
        <p style="color: var(--text-muted); font-size: 1rem;">شكراً لتسوقك معنا.</p>
        <button class="close-overlay-btn" onclick="closeSuccessScreen()">العودة للمتجر</button>
    </div>

    <script>
        let totalPrice = 0;
        let totalItems = 0;

        // مكتبة صور رايقة وهادية تناسب الستايل الجديد
        const defaultImages = [
            "https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400",
            "https://images.unsplash.com/photo-1549298916-b41d501d3772?w=400",
            "https://images.unsplash.com/photo-1618354691373-d851c5c3a990?w=400",
            "https://images.unsplash.com/photo-1588850561407-ed78c282e89b?w=400",
            "https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=400"
        ];
        let imgIndex = 0;

        function addNewProduct() {
            const name = document.getElementById('prod-name').value;
            const desc = document.getElementById('prod-desc').value;
            const price = parseInt(document.getElementById('prod-price').value);
            const category = document.getElementById('prod-category').value;

            if(!name || !desc || !price) {
                alert("يرجى ملء جميع الحقول لإضافة المنتج.");
                return;
            }

            document.getElementById(`section-${category}`).style.display = "block";

            const currentImg = defaultImages[imgIndex % defaultImages.length];
            imgIndex++;

            const cardHTML = `
                <div class="clothing-card">
                    <img src="${currentImg}" class="clothing-img">
                    <div class="clothing-details">
                        <h3>${name}</h3>
                        <p>${desc}</p>
                        <div class="rating-stars">★★★★★</div>
                    </div>
                    <div class="action-side">
                        <span class="item-price">${price} RS</span>
                        <button class="add-to-bag-btn" onclick="buyItem(${price})">إضافة</button>
                    </div>
                </div>
            `;

            document.getElementById(`container-${category}`).insertAdjacentHTML('beforeend', cardHTML);

            // تصفية الحقول
            document.getElementById('prod-name').value = '';
            document.getElementById('prod-desc').value = '';
            document.getElementById('prod-price').value = '';
        }

        function buyItem(price) {
            totalPrice += price;
            totalItems += 1;
            document.getElementById('total-price').innerText = totalPrice;
            document.getElementById('bag-count').innerText = totalItems;
        }

        function showSuccessScreen() {
            if(totalPrice === 0) return;
            document.getElementById('success-screen').style.display = 'flex';
        }

        function closeSuccessScreen() {
            document.getElementById('success-screen').style.display = 'none';
        }
    </script>
</body>
</html>
