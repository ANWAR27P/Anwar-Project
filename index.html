<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA COFFEE | Luxury Menu</title>
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), 
                        url('https://images.unsplash.com/photo-1501339817302-444d182d68b9?q=80&w=1000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            text-align: center; 
            margin: 0;
            padding: 20px;
        }
        .header { margin-top: 50px; margin-bottom: 40px; }
        .logo-text { color: #d4af37; font-size: 3.5rem; font-weight: 900; letter-spacing: 5px; text-shadow: 2px 2px 10px rgba(0,0,0,0.5); }
        .sub-text { color: #f1f1f1; font-size: 1.2rem; margin-top: -10px; opacity: 0.8; }
        
        .menu-container { max-width: 450px; margin: 0 auto; background: rgba(0, 0, 0, 0.6); padding: 20px; border-radius: 25px; backdrop-filter: blur(10px); border: 1px solid rgba(212, 175, 55, 0.3); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .item:last-child { border-bottom: none; }
        .price { color: #d4af37; font-weight: bold; margin-right: 10px; }
        
        button { background: #d4af37; border: none; color: black; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:hover { background: #fff; transform: scale(1.05); }

        .cart-section { margin-top: 30px; padding: 20px; background: #d4af37; color: black; border-radius: 20px; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .order-btn { background: black; color: white; width: 100%; margin-top: 15px; padding: 15px; font-size: 1.1rem; }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo-text">RA COFFEE</div>
        <p class="sub-text">تجربة القهوة المختصة الفاخرة</p>
    </div>
    
    <div class="menu-container">
        <div class="item">
            <div>
                <strong>كورتادو</strong>
                <div style="font-size: 0.8rem; opacity: 0.7;">Cortado</div>
            </div>
            <div>
                <span class="price">16 SR</span>
                <button onclick="addToCart('كورتادو', 16)">+</button>
            </div>
        </div>
        <div class="item">
            <div>
                <strong>فلات وايت</strong>
                <div style="font-size: 0.8rem; opacity: 0.7;">Flat White</div>
            </div>
            <div>
                <span class="price">18 SR</span>
                <button onclick="addToCart('فلات وايت', 18)">+</button>
            </div>
        </div>
        <div class="item">
            <div>
                <strong>آيس لاتيه</strong>
                <div style="font-size: 0.8rem; opacity: 0.7;">Iced Latte</div>
            </div>
            <div>
                <span class="price">21 SR</span>
                <button onclick="addToCart('آيس لاتيه', 21)">+</button>
            </div>
        </div>
    </div>

    <div id="cart" class="cart-section">
        <h3>سلة الطلبات</h3>
        <div id="cart-items" style="font-weight: bold;"></div>
        <div style="font-size: 1.5rem; margin-top: 10px;">المجموع: <span id="total">0</span> ريال</div>
        <button class="order-btn" onclick="sendOrder()">إرسال الطلب عبر WhatsApp</button>
    </div>

    <script>
        let cart = [];
        let total = 0;

        function addToCart(name, price) {
            cart.push(name);
            total += price;
            document.getElementById('cart').style.display = 'block';
            updateCartUI();
        }

        function updateCartUI() {
            document.getElementById('cart-items').innerText = cart.join(' - ');
            document.getElementById('total').innerText = total;
        }

        function sendOrder() {
            let message = "طلب جديد من تطبيق RA COFFEE:\n" + cart.join('\n') + "\nالمجموع: " + total + " ريال";
            window.open("https://wa.me/966500000000?text=" + encodeURIComponent(message));
        }
    </script>
</body>
</html>
