<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA COFFEE | Luxury Menu</title>
    <style>
        body { 
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), 
                        url('https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: white; 
            font-family: 'Cairo', sans-serif; 
            margin: 0;
            padding: 20px;
        }
        .logo-section { margin: 60px 0; text-align: center; }
        .logo-text { color: #d4af37; font-size: 3.5rem; font-weight: 900; letter-spacing: 4px; text-shadow: 2px 4px 15px rgba(0,0,0,1); }
        
        .menu-card { max-width: 500px; margin: 0 auto; background: rgba(255, 255, 255, 0.05); padding: 25px; border-radius: 30px; backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.2); }
        .item { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .item-info strong { font-size: 1.2rem; display: block; color: #fff; }
        .item-info span { font-size: 0.85rem; color: #d4af37; }
        
        .add-btn { background: #d4af37; border: none; color: black; width: 40px; height: 40px; border-radius: 50%; font-size: 1.5rem; cursor: pointer; transition: 0.3s; }
        .add-btn:hover { background: #fff; transform: scale(1.1); }

        .cart-bar { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; background: #d4af37; color: black; padding: 15px; border-radius: 20px; display: none; text-align: center; box-shadow: 0 10px 40px rgba(0,0,0,0.5); }
        .order-now { background: black; color: white; border: none; padding: 10px 20px; border-radius: 10px; margin-top: 10px; width: 100%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="logo-section">
        <div class="logo-text">RA COFFEE</div>
        <div style="color: #ccc; letter-spacing: 2px;">LUXURY EXPERIENCE</div>
    </div>
    
    <div class="menu-card">
        <div class="item">
            <div class="item-info">
                <strong>كورتادو</strong>
                <span>16 SR | Cortado</span>
            </div>
            <button class="add-btn" onclick="addToCart('كورتادو', 16)">+</button>
        </div>
        <div class="item">
            <div class="item-info">
                <strong>فلات وايت</strong>
                <span>18 SR | Flat White</span>
            </div>
            <button class="add-btn" onclick="addToCart('فلات وايت', 18)">+</button>
        </div>
        <div class="item">
            <div class="item-info">
                <strong>آيس لاتيه</strong>
                <span>21 SR | Iced Latte</span>
            </div>
            <button class="add-btn" onclick="addToCart('آيس لاتيه', 21)">+</button>
        </div>
    </div>

    <div id="cartBar" class="cart-bar">
        <div style="font-weight: bold;">سلة الطلبات: <span id="total">0</span> ريال</div>
        <button class="order-now" onclick="sendWhatsApp()">إرسال الطلب (WhatsApp)</button>
    </div>

    <script>
        let total = 0;
        let items = [];

        function addToCart(name, price) {
            items.push(name);
            total += price;
            document.getElementById('cartBar').style.display = 'block';
            document.getElementById('total').innerText = total;
        }

        function sendWhatsApp() {
            let msg = "طلب جديد من RA COFFEE:\n" + items.join('\n') + "\nالمجموع: " + total + " ريال";
            window.open("https://wa.me/966500000000?text=" + encodeURIComponent(msg));
        }
    </script>
</body>
</html>
