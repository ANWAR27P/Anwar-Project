<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASC | Casual Store</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
    
    <style>
        :root { 
            --accent: #5c9ead; 
            --bg-dark: #121214;
            --card-bg: #1e1e22; 
            --text-main: #ffffff;
            --text-muted: #a0a0ab;
            --border-color: #27272a;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { 
            background: var(--bg-dark); color: var(--text-main); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            direction: rtl; text-align: right; padding-bottom: 50px;
        }
        .top-navbar { 
            position: sticky; top: 0; z-index: 999; 
            background: #141416; padding: 15px 20px; 
            display: flex; justify-content: space-between; align-items: center; 
            border-bottom: 1px solid var(--border-color); 
        }
        .brand-name { font-weight: 700; font-size: 1.4rem; color: #fff; }
        .brand-name span { color: var(--accent); }
        .admin-btn { 
            background: none; border: 1px solid var(--accent); 
            color: var(--accent); padding: 6px 14px; border-radius: 6px; cursor: pointer;
        }
        
        .store-container { padding: 20px; max-width: 600px; margin: 0 auto; }
        .category-title { margin: 25px 0 15px; font-size: 1.2rem; font-weight: 700; color: #fff; }
        
        /* كروت المنتجات الفخمة المضمونة */
        .clothing-card { 
            background: var(--card-bg); border-radius: 14px; 
            display: flex; align-items: center; padding: 14px; 
            margin-bottom: 15px; border: 1px solid var(--border-color); 
        }
        .clothing-img { width: 80px; height: 100px; border-radius: 8px; object-fit: cover; background: #141416; }
        .clothing-details { flex: 1; margin-right: 15px; }
        .clothing-details h3 { margin: 0 0 5px 0; font-size: 1.1rem; color: #fff; }
        .clothing-details p { margin: 0; color: var(--text-muted); font-size: 0.85rem; }
        .item-price { color: var(--accent); font-weight: 700; font-size: 1.1rem; }
        
        /* لوحة التحكم */
        .admin-panel { 
            background: #19191c; padding: 20px; margin-top: 30px; border-radius: 16px; border: 1px solid var(--border-color);
        }
        .form-group { margin-bottom: 12px; }
        .form-group label { display: block; margin-bottom: 5px; color: var(--text-muted); font-size: 0.85rem; }
        .form-group input, .form-group select { 
            width: 100%; padding: 10px; border-radius: 8px; 
            border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-main); 
        }
        .add-product-btn { 
            width: 100%; background: var(--accent); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 600; cursor: pointer;
        }
    </style>
</head>
<body>

    <div class="top-navbar">
        <div class="brand-name">ASC<span>STUDIO</span></div>
        <button class="admin-btn" onclick="document.getElementById('admin-section').scrollIntoView({behavior: 'smooth'})">🛠️ إدارة المتجر</button>
    </div>

    <div class="store-container">
        <div class="category-title">المنتجات المتوفرة في المتجر</div>
        <div id="products-list">
            <p style="color: var(--text-muted); text-align: center; padding: 20px;" id="no-items">في انتظار إضافة أول منتج حقيقي...</p>
        </div>
    </div>

    <div class="store-container" id="admin-section">
        <div class="admin-panel">
            <h2 style="text-align:center; margin-bottom:15px; font-size:1.1rem;">🛠️ إضافة منتج إلى السيرفر مباشرة</h2>
            <div class="form-group"><label>اسم المنتج:</label><input type="text" id="p-name" placeholder="مثال: تيشيرت أبيض فاخر"></div>
            <div class="form-group"><label>الوصف / المقاس:</label><input type="text" id="p-desc" placeholder="مثال: مقاس M قطن ناعم"></div>
            <div class="form-group"><label>رابط الصورة (اختياري):</label><input type="text" id="p-img" placeholder="ضع رابط الصورة هنا"></div>
            <div class="form-group"><label>السعر (RS):</label><input type="number" id="p-price" placeholder="مثال: 120"></div>
            <button class="add-product-btn" onclick="uploadToFirebase()">حفظ ونشر في المتجر فوراً ✨</button>
        </div>
    </div>

    <script>
        // إعدادات مشروعك المأخوذة من لقطة الشاشة 100%
        const firebaseConfig = {
            apiKey: "AIzaSyCddZxJ-Qvbj2IoCWLQfaMK5IR6Q_gVdpY",
            authDomain: "asc-studio-5272d.firebaseapp.com",
            databaseURL: "https://asc-studio-5272d-default-rtdb.firebaseio.com",
            projectId: "asc-studio-5272d",
            storageBucket: "asc-studio-5272d.firebasestorage.app",
            messagingSenderId: "809855684821",
            appId: "1:809855684821:web:9f6a5eecf3e273947f125c"
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        // جلب البيانات من الجذر مباشرة لحل مشكلة الـ null
        database.ref('/').on('value', (snapshot) => {
            const listContainer = document.getElementById('products-list');
            if(!listContainer) return;
            
            listContainer.innerHTML = '';
            let hasData = false;

            const data = snapshot.val();
            if (data) {
                Object.keys(data).forEach((key) => {
                    const item = data[key];
                    // نتأكد أن الكائن يحتوي على بيانات منتج فعلي وليس قيمة عشوائية
                    if(item && item.name) {
                        hasData = true;
                        const cardHTML = `
                            <div class="clothing-card">
                                <img src="${item.img || 'https://images.unsplash.com/photo-1521572267360-ee0c2909d518?w=400'}" class="clothing-img">
                                <div class="clothing-details">
                                    <h3>${item.name}</h3>
                                    <p>${item.desc || ''}</p>
                                </div>
                                <div class="item-price">${item.price} RS</div>
                            </div>
                        `;
                        listContainer.insertAdjacentHTML('beforeend', cardHTML);
                    }
                });
            }
            
            if(!hasData) {
                listContainer.innerHTML = '<p style="color: var(--text-muted); text-align: center; padding: 20px;">المتجر جاهز ومربوط! ضف منتجاً بالأسفل لتبدأ العرض ✨</p>';
            }
        });

        // دالة الرفع المباشرة للجذر لضمان نزول البيانات في السيرفر فوراً
        function uploadToFirebase() {
            const name = document.getElementById('p-name').value;
            const desc = document.getElementById('p-desc').value;
            const img = document.getElementById('p-img').value;
            const price = document.getElementById('p-price').value;

            if(!name || !price) { alert("يرجى كتابة الاسم والسعر أولاً!"); return; }

            database.ref('/').push({
                name: name, desc: desc, img: img, price: price
            }).then(() => {
                alert("تم الرفع بنجاح وحفظه في السيرفر! 🎉");
                document.getElementById('p-name').value = '';
                document.getElementById('p-desc').value = '';
                document.getElementById('p-img').value = '';
                document.getElementById('p-price').value = '';
            }).catch((err) => {
                alert("خطأ بالرفع: " + err.message);
            });
        }
    </script>
</body>
</html>
