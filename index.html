<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>ASC | Specialty Coffee</title>
    <style>
        :root { --gold: #d4af37; --card-bg: rgba(20, 20, 20, 0.92); }
        
        body { 
            background: #000 url('https://images.unsplash.com/photo-1447933601403-0c6688de566e?q=80&w=2000') no-repeat center center fixed;
            background-size: cover; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0;
        }

        /* الشريط العلوي */
        .top-bar {
            position: sticky; top: 0; z-index: 1000; background: var(--gold); color: #000;
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center;
            font-weight: 900; border-radius: 0 0 25px 25px;
        }
        .order-now-btn { background: #000; color: var(--gold); border: none; padding: 10px 22px; border-radius: 12px; font-weight: bold; cursor: pointer; }

        /* السلة العائمة الجديدة */
        .floating-cart {
            position: fixed; bottom: 30px; left: 30px; background: var(--gold);
            color: #000; width: 65px; height: 65px; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4); z-index: 999;
            font-weight: bold; flex-direction: column; border: 3px solid #000;
        }
        .cart-count { font-size: 1.2rem; margin-top: -2px; }
        .cart-label { font-size: 0.6rem; text-transform: uppercase; }

        .logo-section { text-align: center; padding: 40px 0 20px; }
        .logo-circle {
            width: 85px; height: 85px; border: 2.5px solid var(--gold); border-radius: 50%;
            display: flex; align-items: center; justify-content: center; margin: 0 auto 10px;
            font-weight: 900; font-size: 1.6rem; color: var(--gold);
            box-shadow: 0 0 30px rgba(212,175,55,0.3);
        }

        .section-title { 
            color: var(--gold); margin: 30px 20px 15px; font-weight: bold; 
            text-align: right; border-right: 4px solid var(--gold); padding-right: 12px;
        }

        /* البطاقات */
        .menu-container { padding: 0 15px 100px; } /* زيادة padding أسفل عشان السلة */
        .item-card {
            background: var(--card-bg); border-radius: 25px; display: flex; align-items: center;
            padding: 15px; margin-bottom: 18px; border: 1px solid rgba(255,255,255,0.08);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
        }
        .item-img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; }
        .item-info { flex: 1; margin-right: 18px; text-align: right; }
        .item-info b { display: block; font-size: 1.1rem; margin-bottom: 2px; }
        .item-info small { color: #aaa; font-size: 0.8rem; display: block; margin-bottom: 5px; }
        
        /* النجوم الذهبية */
        .stars { color: var(--gold); font-size: 0.8rem; letter-spacing: 2px; }

        .price-side { text-align: left; min-width: 80px; }
        .price-val { color: var(--gold); font-weight: 900; display: block; margin-bottom: 8px; font-size: 1.1rem; }
        .buy-button { background: var(--gold); color: #000; border: none; padding: 7px 22px; border-radius: 50px; font-weight: bold; cursor: pointer; }

        #prep-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.97); z-index: 2000; flex-direction: column; 
            justify-content: center; align-items: center; backdrop-filter: blur(30px);
        }
        .back-menu { margin-top: 50px; background: transparent; color: var(--gold); border: 1.5px solid var(--gold); padding: 12px 40px; border-radius: 50px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="floating-cart" onclick="openPrep()">
        <span id="items-count" class="cart-count">0</span>
        <span class="cart-label">Items</span>
    </div>

    <div id="main-ui">
        <div class="top-bar">
            <button class="order-now-btn" onclick="openPrep()">Order Now</button>
            <span style="font-size: 1.1rem;">Total: <span id="total-val">0</span> SR</span>
        </div>

        <div class="logo-section">
            <div class="logo-circle">ASC</div>
            <div style="color:var(--gold); letter-spacing:4px; font-weight:bold; font-size:0.9rem;">SPECIALTY COFFEE</div>
        </div>

        <div class="menu-container">
            <div class="section-title">ICED COFFEE |</div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=300" class="item-img">
                <div class="item-info">
                    <b>Iced V60</b>
                    <small>Ethiopian G1</small>
                    <div class="stars">★★★★★ <span style="color:#666; font-size:0.7rem;">(4.9)</span></div>
                </div>
                <div class="price-side"><span class="price-val">SR 18</span><button class="buy-button" onclick="add(18)">Buy</button></div>
            </div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1551046710-18b230e3f330?w=300" class="item-img">
                <div class="item-info">
                    <b>Spanish Latte</b>
                    <small>Sweet & Creamy</small>
                    <div class="stars">★★★★★ <span style="color:#666; font-size:0.7rem;">(4.8)</span></div>
                </div>
                <div class="price-side"><span class="price-val">SR 16</span><button class="buy-button" onclick="add(16)">Buy</button></div>
            </div>

            <div class="section-title">HOT COFFEE |</div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=300" class="item-img">
                <div class="item-info">
                    <b>Flat White</b>
                    <small>Double Shot</small>
                    <div class="stars">★★★★★ <span style="color:#666; font-size:0.7rem;">(5.0)</span></div>
                </div>
                <div class="price-side"><span class="price-val">SR 13</span><button class="buy-button" onclick="add(13)">Buy</button></div>
            </div>

            <div class="section-title">DESSERTS |</div>
            <div class="item-card">
                <img src="https://images.unsplash.com/photo-1571877227200-a0d98ea607e9?w=300" class="item-img">
                <div class="item-info">
                    <b>Tiramisu</b>
                    <small>Classic Italian</small>
                    <div class="stars">★★★★★ <span style="color:#666; font-size:0.7rem;">(4.9)</span></div>
                </div>
                <div class="price-side"><span class="price-val">SR 20</span><button class="buy-button" onclick="add(20)">Buy</button></div>
            </div>
        </div>
    </div>

    <div id="prep-screen">
        <h1 id="clock" style="font-size: 5.5rem; color: var(--gold); margin:0; font-weight: 900;">05:00</h1>
        <p style="font-style:italic; color:#ccc; margin-top:20px;">"Life begins after coffee."</p>
        <button class="back-menu" onclick="closePrep()">Back to Menu</button>
    </div>

    <script>
        let sum = 0;
        let count = 0;
        let timer;
        let sec = 300;

        function add(p) { 
            sum += p; 
            count += 1;
            document.getElementById('total-val').innerText = sum; 
            document.getElementById('items-count').innerText = count;
        }
        
        function openPrep() {
            if(sum === 0) return;
            document.getElementById('prep-screen').style.display = 'flex';
            if(!timer) {
                timer = setInterval(() => {
                    let m = Math.floor(sec/60), s = sec%60;
                    document.getElementById('clock').innerText = m + ":" + (s < 10 ? '0' : '') + s;
                    if(sec-- <= 0) { clearInterval(timer); document.getElementById('clock').innerText = "Ready!"; }
                }, 1000);
            }
        }
        function closePrep() { document.getElementById('prep-screen').style.display = 'none'; }
    </script>
</body>
</html>
