<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA COFFEE | Full Experience</title>
    <style>
        :root { --gold: #d4af37; --dark-bg: rgba(0,0,0,0.85); }
        
        body { 
            background: linear-gradient(var(--dark-bg), rgba(0,0,0,0.95)), 
                        url('https://images.unsplash.com/photo-1507133750040-4a8f57021571?q=80&w=2000&auto=format&fit=crop');
            background-size: cover; background-attachment: fixed; background-position: center;
            color: #fff; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; padding: 0;
        }

        /* شاشة الدخول */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 9999;
            transition: 0.8s ease-in-out;
        }

        /* المحتوى الرئيسي */
        #main-app { display: none; padding: 20px 15px; opacity: 0; transition: 1s; }

        .top-bar {
            position: sticky; top: 10px; background: var(--gold);
            color: #000; padding: 15px; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            max-width: 450px; margin: 0 auto 30px; box-shadow: 0 8px 25px rgba(0,0,0,0.5);
        }

        .logo-text { text-align: center; color: var(--gold); font-size: 2.8rem; font-weight: 900; letter-spacing: 6px; margin: 25px 0; }

        .section-header { 
            color: var(--gold); border-right: 5px solid var(--gold); 
            padding-right: 12px; margin: 35px auto 15px; max-width: 450px; font-weight: bold; font-size: 1.2rem;
        }

        .menu-box { 
            background: rgba(255,255,255,0.03); backdrop-filter: blur(15px);
            border-radius: 25px; border: 1px solid rgba(255,255,255,0.08);
            max-width: 450px; margin: 0 auto 20px; overflow: hidden;
        }

        .menu-item { display: flex; align-items: center; padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .menu-item:last-child { border-bottom: none; }
        
        .img-wrap { width: 75px; height: 75px; margin-left: 15px; }
        .img-wrap img { width: 100%; height: 100%; border-radius: 15px; object-fit: cover; border: 1px solid rgba(212,175,55,0.2); }

        .info { flex-grow: 1; text-align: right; }
        .info b { display: block; font-size: 1.1rem; color: #f0f0f0; }
        .info small { color: #888; font-size: 0.85rem; }

        .price-area { text-align: left; min-width: 90px; }
        .price-tag { color: var(--gold); font-weight: bold; display: block; margin-bottom: 8px; font-size: 1.05rem; }
        
        .buy-btn { background: var(--gold); color: #000; border: none; padding: 7px 20px; border-radius: 50px; font-weight: bold; cursor: pointer; transition: 0.3s; }
        .buy-btn:active { transform: scale(0.9); }

        #prep-screen {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 10000; flex-direction: column; justify-content: center; align-items: center;
        }
    </style>
</head>
<body>

    <!-- 1. شاشة الدخول -->
    <div id="splash-screen">
        <h1 style="color:var(--gold); font-size: 3.5rem; letter-spacing: 8px; margin-bottom: 30px;">RA COFFEE</h1>
        <button class="buy-btn" style="padding: 15px 50px; font-size: 1.2rem;" onclick="startApp()">ابدأ التجربة</button>
    </div>

    <!-- 2. التطبيق الرئيسي -->
    <div id="main-app">
        <div class="top-bar">
            <span>المجموع: <b id="totalPrice">0</b> SR</span>
            <button onclick="finishOrder()" style="background:#000; color:var(--gold); border:none; padding:10px 18px; border-radius:12px; font-weight:800; cursor:pointer;">إتمام الطلب</button>
        </div>

        <div class="logo-text">RA COFFEE</div>

        <!-- المشروبات الباردة -->
        <div class="section-header">المشروبات الباردة</div>
        <div class="menu-box">
            <div class="menu-item">
                <div class="img-wrap"><img src="https://images.unsplash.com/photo-1499961024600-ad094db305cc?w=400"></div>
                <div class="info"><b>V60 بارد</b><small>Specialty V60</small></div>
                <div class="price-area"><span class="price-tag">26 SR</span><button class="buy-btn" onclick="add(26)">شراء</button></div>
            </div>
            <div class="menu-item">
                <div class="img-wrap"><img src="https://images.unsplash.com/photo-1553909489-eb2175af3f52?w=400"></div>
                <div class="info"><b>سبانيش لاتيه</b><small>Iced Spanish</small></div>
                <div class="price-area"><span class="price-tag">24 SR</span><button class="buy-btn" onclick="add(24)">شراء</button></div>
            </div>
            <div class="menu-item">
                <div class="img-wrap"><img src="https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=400"></div>
                <div class="info"><b>آيس أمريكانو</b><small>Iced Americano</small></div>
                <div class="price-area"><span class="price-tag">18 SR</span><button class="buy-btn" onclick="add(18)">شراء</button></div>
            </div>
        </div>

        <!-- القهوة الحارة -->
        <div class="section-header">القهوة الحارة</div>
        <div class="menu-box">
            <div class="menu-item">
                <div class="img-wrap"><img src="https://images.unsplash.com/photo-1541167760496-162955ed8a9f?w=400"></div>
                <div class="info"><b>فلات وايت</b><small>Flat White</small></div>
                <div class="price-area"><span class="price-tag">18 SR</span><button class="buy-btn" onclick="add(18)">شراء</button></div>
            </div>
            <div class="menu-item">
                <div class="img-wrap"><img src="https://images.unsplash.com/photo-1510591509098-f4fdc6d0ff04?w=400"></div>
                <div class="info"><b>لاتيه حار</b><small>Hot Latte</small></div>
                <div class="price-area"><span class="price-tag">20 SR</span><button class="buy-btn" onclick="add(20)">شراء</button></div>
            </div>
        </div>

        <!-- الحلى -->
        <div class="section-header">الحلى الفاخر</div>
        <div class="menu-box">
            <div class="menu-item">
                <div class="img-wrap"><img src="https://images.unsplash.com/photo-1606312619070-d48b4c652a52?w=400"></div>
                <div class="info"><b>تيراميسو</b><small>Tiramisu</small></div>
                <div class="price-area"><span class="price-tag">32 SR</span><button class="buy-btn" onclick="add(32)">شراء</button></div>
            </div>
            <div class="menu-item">
                <div class="img-wrap"><img src="https://images.unsplash.com/photo-1551024506-0bccd828d307?w=400"></div>
                <div class="info"><b>تشيز كيك</b><small>Cheese Cake</small></div>
                <div class="price-area"><span class="price-tag">25 SR</span><button class="buy-btn" onclick="add(25)">شراء</button></div>
            </div>
        </div>
    </div>

    <!-- 3. شاشة العداد -->
    <div id="prep-screen">
        <div id="countdown" style="font-size: 5rem; color: var(--gold); text-shadow: 0 0 30px rgba(212,175,55,0.5);">05:00</div>
        <h2 style="color: var(--gold); margin-top: 20px;">جاري تحضير طلبك...</h2>
        <button class="buy-btn" style="margin-top:50px; padding: 12px 30px;" onclick="location.reload()">طلب جديد</button>
    </div>

    <script>
        let total = 0;
        function startApp() {
            document.getElementById('splash-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('splash-screen').style.display = 'none';
                const app = document.getElementById('main-app');
                app.style.display = 'block';
                setTimeout(() => { app.style.opacity = '1'; }, 50);
            }, 800);
        }
        function add(price) {
            total += price;
            document.getElementById('totalPrice').innerText = total;
        }
        function finishOrder() {
            if(total === 0) return alert("الرجاء اختيار منتجات أولاً");
            document.getElementById('prep-screen').style.display = 'flex';
            let time = 300;
            const timerEl = document.getElementById('countdown');
            const interval = setInterval(() => {
                let m = Math.floor(time/60); let s = time%60;
                timerEl.innerHTML = `${m}:${s<10?'0':''}${s}`;
                if(time <= 0) { clearInterval(interval); timerEl.innerHTML = "جاهز!"; }
                time--;
            }, 1000);
        }
    </script>
</body>
</html>
