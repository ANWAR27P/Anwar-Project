<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RA COFFEE | Elite Design</title>
    <style>
        body { 
            /* خلفية سينمائية داكنة تعكس ذوقك في الإضاءة الخافتة */
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.9)), 
                        url('https://images.unsplash.com/photo-1507133750040-4a8f57021571?q=80&w=2000&auto=format&fit=crop');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff; 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            margin: 0;
            padding: 20px 15px;
        }

        /* شاشة التحضير الذكية */
        #prep-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            z-index: 3000;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        /* شريط المجموع العلوي - ذهبي فاخر */
        .top-checkout {
            position: sticky; top: 10px; z-index: 1000;
            background: linear-gradient(135deg, #d4af37 0%, #b8860b 100%); 
            color: #000;
            padding: 15px 20px; border-radius: 18px;
            display: flex; justify-content: space-between; align-items: center;
            max-width: 450px; margin: 0 auto 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }

        .complete-btn {
            background: #000; color: #d4af37; border: none;
            padding: 10px 20px; border-radius: 12px; font-weight: 800;
            cursor: pointer; font-size: 0.9rem;
        }

        .logo-text { 
            text-align: center; color: #d4af37; 
            font-size: 2.8rem; font-weight: 900; 
            margin-bottom: 30px; letter-spacing: 6px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        .section-title { 
            color: #d4af37; font-size: 1.3rem; 
            margin: 25px 0 15px; font-weight: bold;
            border-right: 5px solid #d4af37; padding-right: 12px;
        }

        .menu-container { 
            background: rgba(255, 255, 255, 0.03); 
            border-radius: 25px; padding: 8px;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            max-width: 450px; margin: 0 auto;
        }

        .item { 
            display: flex; align-items: center; 
            padding: 18px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .item:last-child { border-bottom: none; }

        .product-img { 
            width: 80px; height: 80px; border-radius: 18px; 
            object-fit: cover; margin-left: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .product-info { flex-grow: 1; text-align: right; }
        .product-info strong { display: block; font-size: 1.15rem; color: #eee; }
        .product-info span { font-size: 0.85rem; color: #888; }

        /* تنسيق السعر والعملة بشكل ثابت */
        .action-area { text-align: left; min-width: 90px; }
        .price-tag { 
            color: #d4af37; font-weight: bold; 
            display: block; margin-bottom: 8px; font-size: 1.1rem;
            direction: ltr; /* لضمان بقاء الرقم يسار العملة أو العكس بشكل منظم */
        }
        
        .buy-btn { 
            background: #d4af37; color: #000; border: none;
            padding: 8px 22px; border-radius: 50px; 
            font-weight: bold; cursor: pointer; transition: 0.3s;
        }
        .buy-btn:hover { background: #fff; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div id="prep-screen">
        <div style="font-size: 4rem; color: #d4af37; margin-bottom: 20px;" id="timerDisplay">05:00</div>
        <h2 style="color: #d4af37;">قهوتك في أيدي أمينة...</h2>
        <p style="color: #888;">يتم الآن تحضير طلبك بكل حب</p>
        <button class="complete-btn" style="margin-top:40px;" onclick="location.reload()">العودة للمنيو</button>
    </div>

    <div class="top-checkout">
        <span style="font-size: 1.1rem;">المجموع: <strong id="cartTotal">0</strong> SR</span>
        <button class="complete-btn" onclick="startPreparation()">اكتمال الطلب</button>
    </div>

    <div class="logo-text">RA COFFEE</div>

    <div class="section-title">المشروبات الباردة</div>
    <div class="menu-container">
        <div class="item">
            <img src="https://images.unsplash.com/photo-1517701550927-30cf4ba1dba5?w=200" class="product-img">
            <div class="product-info">
                <strong>V60 بارد</strong>
                <span>Specialty V60</span>
            </div>
            <div class="action-area">
                <span class="price-tag">26 SR</span>
                <button class="buy-btn" onclick="addToCart(26)">شراء</button>
            </div>
        </div>
    </div>

    <script>
        let total = 0;
        function addToCart(price) {
            total += price;
            document.getElementById('cartTotal').innerText = total;
        }

        function startPreparation() {
            if(total === 0) return alert("اختر قهوتك أولاً!");
            document.getElementById('prep-screen').style.display = 'flex';
            let time = 300;
            const display = document.getElementById('timerDisplay');
            const countdown = setInterval(() => {
                let mins = Math.floor(time/60);
                let secs = time%60;
                display.innerHTML = `${mins}:${secs<10?'0':''}${secs}`;
                if (time-- <= 0) { clearInterval(countdown); display.innerHTML = "جاهز!"; }
            }, 1000);
        }
    </script>
</body>
</html>
