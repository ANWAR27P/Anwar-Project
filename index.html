<div id="prep-screen">
        <div id="timer" style="font-size: 5rem; color: var(--gold); font-weight: 900; text-shadow: 0 0 20px rgba(212,175,55,0.3);">05:00</div>
        
        <h2 id="prep-message" style="color: #fff; margin-top: 20px; font-style: italic; text-align: center; max-width: 80%; line-height: 1.6;">
            لحظات ونستخلص لك السعادة...
        </h2>

        <button class="btn-buy" style="margin-top:50px; opacity: 0.7;" onclick="location.reload()">إلغاء الطلب</button>
    </div>

    <script>
        // مصفوفة العبارات الحلوة
        const phrases = [
            "لحظات ونستخلص لك السعادة...",
            "قهوتك تُحضر بكل حب وإتقان...",
            "رائحة البن بدأت تملأ المكان...",
            "الدقة في الاستخلاص هي سر طعمنا...",
            "قربت تجهز أجمل قهوة ليومك..."
        ];

        function pay() {
            if(count === 0) return;
            document.getElementById('prep-screen').style.display = 'flex';
            let t = 300;
            let phraseIndex = 0;

            const iv = setInterval(() => {
                let m = Math.floor(t/60), s = t%60;
                document.getElementById('timer').innerHTML = m + ":" + (s<10?'0':'')+s;
                
                // تغيير العبارة كل دقيقة (60 ثانية)
                if (t % 60 === 0 && t !== 300) {
                    phraseIndex = (phraseIndex + 1) % phrases.length;
                    document.getElementById('prep-message').innerText = phrases[phraseIndex];
                }

                if(t-- <= 0) {
                    clearInterval(iv);
                    document.getElementById('timer').innerHTML = "استمتع!";
                    document.getElementById('prep-message').innerText = "قهوتك جاهزة لاستلامها ☕";
                }
            }, 1000);
        }
    </script>
