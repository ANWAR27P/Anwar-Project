<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تطبيق الأذكار الفاخر</title>
    <!-- استيراد خطوط عربية أنيقة من جوجل -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Tajawal:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0b0c10;      /* أسود ملكي عميق */
            --card-bg: #1f2833;       /* رمادي داكن فاخر */
            --gold-accent: #c5a059;   /* ذهبي مطفي */
            --text-main: #f5f5f5;     /* أبيض عاجي */
            --text-muted: #95a5a6;    /* رمادي ناعم */
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* العناوين بلمسة كلاسيكية */
        h1 {
            font-family: 'Amiri', serif;
            color: var(--gold-accent);
            font-size: 2.5rem;
            margin-bottom: 5px;
            text-align: center;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.9rem;
            margin-bottom: 30px;
            letter-spacing: 1px;
        }

        /* كارت الذكر */
        .azkar-container {
            width: 100%;
            max-width: 500px;
            perspective: 1000px;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid rgba(197, 160, 89, 0.2);
            border-radius: 16px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: all 0.4s ease;
            cursor: pointer;
            user-select: none;
        }

        .card:hover {
            border-color: var(--gold-accent);
            transform: translateY(-5px);
        }

        .category-badge {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            background: rgba(197, 160, 89, 0.1);
            color: var(--gold-accent);
            font-size: 0.85rem;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .azkar-text {
            font-family: 'Amiri', serif;
            font-size: 1.6rem;
            line-height: 2.2rem;
            margin-bottom: 25px;
            min-height: 80px;
        }

        /* زر العداد الدائري */
        .counter-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: transparent;
            border: 2px solid var(--gold-accent);
            color: var(--gold-accent);
            font-size: 1.8rem;
            font-family: 'Tajawal', sans-serif;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        .counter-btn:active {
            transform: scale(0.9);
            background-color: var(--gold-accent);
            color: var(--bg-color);
        }

        /* زر طلب التنبيهات */
        .notify-btn {
            margin-top: 40px;
            background: transparent;
            border: 1px solid var(--text-muted);
            color: var(--text-muted);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.3s;
        }

        .notify-btn:hover {
            border-color: var(--gold-accent);
            color: var(--gold-accent);
        }

        /* حركات التلاشي عند الانتقال */
        .fade-out {
            opacity: 0;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <h1>الذِّكْر</h1>
    <p class="subtitle">تذكير وتدبّر يومي صامت</p>

    <div class="azkar-container">
        <div class="card" id="azkarCard" onclick="decrementCounter()">
            <span class="category-badge" id="category">أذكار الصباح</span>
            <div class="azkar-text" id="text">جاري تحميل الذكر...</div>
            <button class="counter-btn" id="counter">3</button>
        </div>
    </div>

    <button class="notify-btn" onclick="requestNotificationPermission()">تفعيل تنبيهات المتصفح</button>

    <script>
        // عينة بيانات محلية (ستستبدل لاحقاً بملف JSON كامل)
        const azkarData = [
            { id: 1, category: "أذكار الصباح", text: "أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ.", count: 3 },
            { id: 2, category: "أذكار الصباح", text: "اللَّهُمَّ عافِني في بَدَني، اللَّهُمَّ عافِني في سَمْعي، اللَّهُمَّ عافِني في بَصَري، لا إلهَ إلَّا أنتَ.", count: 3 },
            { id: 3, category: "أذكار المساء", text: "أَمْسَيْنَا وَأَمْسَى الْمُلْكُ لِلَّهِ وَالْحَمْدُ لِلَّهِ.", count: 1 }
        ];

        let currentIndex = 0;
        let currentCount = 0;

        function loadAzkar() {
            if (currentIndex >= azkarData.length) {
                // إذا انتهت الأذكار
                document.getElementById('category').innerText = "تم بحمد الله";
                document.getElementById('text').innerText = "لقد أكملت جميع الأذكار الحالية. طاب يومك!";
                document.getElementById('counter').style.display = "none";
                return;
            }

            const currentAzkar = azkarData[currentIndex];
            currentCount = currentAzkar.count;

            // تحديث الواجهة
            document.getElementById('category').innerText = currentAzkar.category;
            document.getElementById('text').innerText = currentAzkar.text;
            document.getElementById('counter').innerText = currentCount;
            document.getElementById('counter').style.display = "flex";
        }

        function decrementCounter() {
            if (currentIndex >= azkarData.length) return;

            // دعم الاهتزاز في الجوال عند الضغط
            if (navigator.vibrate) navigator.vibrate(50);

            currentCount--;
            document.getElementById('counter').innerText = currentCount;

            if (currentCount <= 0) {
                // حركة انتقال ناعمة للذكر التالي
                const card = document.getElementById('azkarCard');
                card.classList.add('fade-out');
                
                setTimeout(() => {
                    currentIndex++;
                    loadAzkar();
                    card.classList.remove('fade-out');
                }, 400);
            }
        }

        // تفعيل طلب إذن التنبيهات من المتصفح
        function requestNotificationPermission() {
            if (!("Notification" in window)) {
                alert("متصفحك لا يدعم تنبيهات سطح المكتب.");
                return;
            }

            Notification.requestPermission().then(permission => {
                if (permission === "granted") {
                    alert("تم تفعيل التنبيهات بنجاح!");
                    // تجربة إرسال تنبيه فوري
                    new Notification("تطبيق الذكر", { body: "مرحباً بك، سيتم تذكيرك بالأذكار دورياً." });
                }
            });
        }

        // تشغيل التطبيق لأول مرة عند تحميل الصفحة
        window.onload = loadAzkar;
    </script>
</body>
</html>
